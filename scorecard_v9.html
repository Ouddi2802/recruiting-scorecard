let currentDimension = 0;
let answers = {};
let showResults = false;

function getRecommendation(score) {
  if (score <= 20) {
    return { status: "KRITISCH", color: "#DC2626", emoji: "🚨", description: "Ihr Recruiting-System reagiert nur auf akute Probleme. Ohne strukturelle Verbesserungen wird es schwer, Top-Talente zu gewinnen." };
  } else if (score <= 36) {
    return { status: "ENTWICKLUNGSBEDARF", color: "#F59E0B", emoji: "⚠️", description: "Ihr Recruiting-System funktioniert im Alltag, aber ineffizient. Es gibt klare Schwachstellen, die Sie kurzfristig angehen sollten." };
  } else if (score <= 48) {
    return { status: "OPTIMIERUNGSPOTENZIAL", color: "#EAB308", emoji: "📈", description: "Ihr Recruiting-System funktioniert, hat aber noch Lücken. Mit gezielten Optimierungen kommen Sie auf das nächste Level." };
  } else {
    return { status: "GUT AUFGESTELLT", color: "#10B981", emoji: "✅", description: "Ihr Recruiting-System ist professionell. Sie gehören zu den Top 10% der mittelständischen Unternehmen!" };
  }
}

function getTotalScore() {
  return Object.values(answers).reduce((sum, val) => sum + val, 0);
}

function getDimensionScore(dimIndex) {
  let score = 0;
  dimensions[dimIndex].questions.forEach((_, qIndex) => {
    score += answers[`${dimIndex}-${qIndex}`] || 0;
  });
  return score;
}

function getDimensionStatus(score) {
  if (score <= 4) return 'critical';
  if (score <= 6) return 'developing';
  return 'strong';
}

function getPrioritizedDimensions() {
  const dimensionScores = dimensions.map((dim, idx) => ({
    index: idx,
    name: dim.title,
    score: getDimensionScore(idx),
    status: getDimensionStatus(getDimensionScore(idx))
  }));
  return dimensionScores.sort((a, b) => {
    if (a.status === 'critical' && b.status !== 'critical') return -1;
    if (a.status !== 'critical' && b.status === 'critical') return 1;
    if (a.status === 'developing' && b.status === 'strong') return -1;
    if (a.status === 'strong' && b.status === 'developing') return 1;
    return a.score - b.score;
  });
}

function isCurrentDimensionComplete() {
  const currentQuestions = dimensions[currentDimension].questions;
  return currentQuestions.every((_, idx) => answers[`${currentDimension}-${idx}`] !== undefined);
}

function handleAnswer(questionIndex, value) {
  const key = `${currentDimension}-${questionIndex}`;
  answers[key] = value;
  render();
}

function goToNextDimension() {
  if (currentDimension < dimensions.length - 1) {
    currentDimension++;
    render();
  } else {
    showResults = true;
    render();
    trackResult('view');
  }
}

function goToPreviousDimension() {
  if (currentDimension > 0) {
    currentDimension--;
    render();
  }
}

function renderActionField(dim) {
  const dimName = dim.name;
  const score = dim.score;
  const status = dim.status;
  const rec = recommendations[dimName][status];
  if (!rec) return '';

  const icon = status === 'critical' ? '🚨' : (status === 'developing' ? '⚠️' : '✅');
  const statusText = status === 'critical' ? 'KRITISCH' : (status === 'developing' ? 'ENTWICKLUNGSBEDARF' : 'STÄRKE');

  return `
    <div class="action-field">
      <div class="action-field-header">
        <span class="action-field-icon">${icon}</span>
        <div>
          <div class="action-field-title">${statusText}: ${dimName} (${score}/10)</div>
        </div>
      </div>
      <div class="action-field-why">
        <strong>Warum das wichtig ist:</strong><br>
        ${rec.description}
      </div>
      ${rec.quickWins && rec.quickWins.length > 0 ? `
      <div class="action-section">
        <div class="action-section-title">⚡ SOFORT UMSETZBAR:</div>
        <div class="action-item">
          <div class="action-item-title">${rec.quickWins[0].title}</div>
          <div class="action-item-meta">⏱ ${rec.quickWins[0].time}</div>
          <div class="action-item-impact">→ ${rec.quickWins[0].impact}</div>
        </div>
      </div>` : ''}
      ${rec.optimization && rec.optimization.length > 0 ? `
      <div class="action-section">
        <div class="action-section-title">🚀 NÄCHSTER SCHRITT:</div>
        <div class="action-item">
          <div class="action-item-title">${rec.optimization[0].title}</div>
          <div class="action-item-meta">⏱ ${rec.optimization[0].time}</div>
          <div class="action-item-impact">→ ${rec.optimization[0].impact}</div>

      </div>
    </div>
  `;
}

function renderQuestions() {
  const dimension = dimensions[currentDimension];
  const progress = ((currentDimension + 1) / dimensions.length) * 100;
  const isComplete = isCurrentDimensionComplete();

  return `
    <div class="progress-bar-container">
      <div class="progress-info">
        <span>Dimension ${currentDimension + 1} von ${dimensions.length}</span>
        <span>${Math.round(progress)}% abgeschlossen</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width: ${progress}%"></div>
      </div>
    </div>
    <h2 class="dimension-title">${dimension.title}</h2>
    <div class="questions-container">
      ${dimension.questions.map((question, idx) => {
        const key = `${currentDimension}-${idx}`;
        const value = answers[key];
        return `
          <div class="question-block">
            <div class="question-text">${idx + 1}. ${question}</div>
            <div class="answer-buttons">
              <button class="answer-button ${value === 2 ? 'selected' : ''}" onclick="handleAnswer(${idx}, 2)">✓ Ja, etabliert</button>
              <button class="answer-button ${value === 1 ? 'selected' : ''}" onclick="handleAnswer(${idx}, 1)">⚡ In Arbeit</button>
              <button class="answer-button ${value === 0 ? 'selected' : ''}" onclick="handleAnswer(${idx}, 0)">✗ Nein</button>
            </div>
          </div>
        `;
      }).join('')}
    </div>
    <div class="navigation">
      <button class="nav-button back" onclick="goToPreviousDimension()" ${currentDimension === 0 ? 'disabled' : ''}>← Zurück</button>
      <button class="nav-button next" onclick="goToNextDimension()" ${!isComplete ? 'disabled' : ''}>
        ${currentDimension === dimensions.length - 1 ? 'Auswertung anzeigen' : 'Weiter'} →
      </button>
    </div>
  `;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = showResults ? renderResults() : renderQuestions();
}

render();

function formatDimensionOverview() {
  const dimNames = ["Prozessklarheit", "Digitalisierung & Tools", "Candidate Experience", "Datenbasierte Steuerung", "Team & Kompetenzen", "Kulturelle Verankerung"];
  const lines = [];
  lines.push("DIMENSIONEN:");
  for (let i = 0; i < 6; i++) {
    const score = getDimensionScore(i);
    const status = score <= 4 ? 'Kritisch' : (score <= 6 ? 'Entwicklung' : 'Stark');
    lines.push(`${dimNames[i]}: ${score}/10 (${status})`);
  }
  lines.push("");
  let weakestIdx = 0;
  let weakestScore = getDimensionScore(0);
  for (let i = 1; i < 6; i++) {
    const s = getDimensionScore(i);
    if (s < weakestScore) { weakestScore = s; weakestIdx = i; }
  }
  lines.push(`Groesster Handlungsbedarf: ${dimNames[weakestIdx]} (${weakestScore}/10)`);
  return lines.join("\n");
}

function formatHandlungsfeld(dim) {
  const rec = recommendations[dim.name][dim.status];
  if (!rec) return '';
  const statusText = dim.status === 'critical' ? 'KRITISCH' : (dim.status === 'developing' ? 'ENTWICKLUNGSBEDARF' : 'STARK');
  const lines = [];
  lines.push(`${statusText}: ${dim.name} (${dim.score}/10)`);
  lines.push("");
  lines.push("Warum das wichtig ist:");
  lines.push(rec.description);
  lines.push("");
  if (rec.quickWins && rec.quickWins.length > 0) {
    lines.push("QUICK WINS:");
    rec.quickWins.forEach(action => {
      lines.push(`- ${action.title} (${action.time})`);
      lines.push(`  ${action.impact}`);
    });
    lines.push("");
  }
  if (rec.midTerm && rec.midTerm.length > 0) {
    lines.push("MITTELFRISTIG:");
    rec.midTerm.forEach(action => {
      lines.push(`- ${action.title} (${action.time})`);
      lines.push(`  ${action.impact}`);
    });
  }
  if (rec.optimization && rec.optimization.length > 0) {
    lines.push("OPTIMIERUNG:");
    rec.optimization.forEach(action => {
      lines.push(`- ${action.title} (${action.time})`);
      lines.push(`  ${action.impact}`);
    });
  }
  return lines.join("\n");
}

function formatStaerken(strengths) {
  if (strengths.length === 0) return 'Keine ausgeprägten Stärken identifiziert – alle Dimensionen haben Entwicklungspotenzial.';
  const lines = [];
  strengths.forEach(s => {
    lines.push(`${s.name} (${s.score}/10)`);
    lines.push(`${recommendations[s.name].strong.description}`);
    lines.push("");
  });
  return lines.join("\n");
}

  trackResult('mail');
  const totalScore = getTotalScore();
  const rec = getRecommendation(totalScore);
  const prioritized = getPrioritizedDimensions();
  const actionDimensions = prioritized.filter(d => d.status === 'critical' || d.status === 'developing').slice(0, 3);

    `&${MS_FORM_FIELD_IDS.email}=${encodeURIComponent(email)}` +
    `&${MS_FORM_FIELD_IDS.total}=${encodeURIComponent(totalScore + "/60")}` +
    `&${MS_FORM_FIELD_IDS.status}=${encodeURIComponent(rec.status)}` +
    `&${MS_FORM_FIELD_IDS.details}=${encodeURIComponent(formatDimensionOverview())}` +
    `&${MS_FORM_FIELD_IDS.handlungsfeld1}=${encodeURIComponent(actionDimensions[0] ? formatHandlungsfeld(actionDimensions[0]) : '')}` +
    `&${MS_FORM_FIELD_IDS.handlungsfeld2}=${encodeURIComponent(actionDimensions[1] ? formatHandlungsfeld(actionDimensions[1]) : '')}` +
    `&${MS_FORM_FIELD_IDS.handlungsfeld3}=${encodeURIComponent(actionDimensions[2] ? formatHandlungsfeld(actionDimensions[2]) : '')}` +
    `&${MS_FORM_FIELD_IDS.staerken}=${encodeURIComponent(formatStaerken(strengths))}`;

  const prefilledUrl = MS_FORM_BASE_URL + params;
  alert("Fast fertig: Das Formular öffnet sich vorausgefüllt. Bitte einmal absenden, dann kommt die E-Mail.");
  window.open(prefilledUrl, "_blank", "noopener,noreferrer");
}

function handleBookingClick() {
  trackResult('termin');
  window.open("https://calendly.com/hiringlab_erstgespraech/30min", "_blank", "noopener,noreferrer");
}

function trackResult(action) {
  const totalScore = getTotalScore();
  const result = getRecommendation(totalScore);
  const dimNames = ["Prozessklarheit", "Digitalisierung & Tools", "Candidate Experience", "Datenbasierte Steuerung", "Team & Kompetenzen", "Kulturelle Verankerung"];
  
  const payload = {
    timestamp: new Date().toISOString(),
    action: action,
    total_score: totalScore,
    status: result.status,
    scores: {},
    antworten: {}
  };

  // Dimension scores
  dimNames.forEach((name, idx) => {
    payload.scores[name] = getDimensionScore(idx);
  });

  // Individual question answers
  dimNames.forEach((dimName, dimIdx) => {
    dimensions[dimIdx].questions.forEach((question, qIdx) => {
      const key = `${dimIdx}-${qIdx}`;
      const value = answers[key];
      const label = value === 2 ? 'Ja, etabliert' : (value === 1 ? 'In Arbeit' : 'Nein');
      payload.antworten[`${dimName} – F${qIdx + 1}`] = label;
    });
  });

  const MAKE_WEBHOOK_URL = "https://hook.eu2.make.com/64bune5t6s1posv6tr5svxb0xxuj1cwg";
  if (MAKE_WEBHOOK_URL !== "MAKE_WEBHOOK_URL_HIER_EINTRAGEN") {
    fetch(MAKE_WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    }).catch(() => {});
  }
}
