<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnose-Check Ergebnis | HiringLab</title>
<link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #e8e4dc; font-family: 'Open Sans', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 24px; min-height: 100vh; }

.toolbar { display: flex; gap: 12px; margin-bottom: 20px; }
.toolbar button {
  background: #142f48; color: #fff; border: none; padding: 10px 24px;
  border-radius: 6px; font-family: 'Open Sans', sans-serif; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: background 0.2s;
}
.toolbar button:hover { background: #1d4268; }

.slide {
  width: 960px; background: #142f48; border-radius: 0; overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.15);
}

/* Shared slide internals */
.slide-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 32px 40px 0;
}
.slide-header-left { flex: 1; }
.slide-header-left .label {
  color: #cfdae6; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px;
}
.slide-header-left h1 {
  font-family: 'Gilda Display', serif; color: #ffffff; font-size: 26px; font-weight: 400;
}
.slide-header-left .subtitle {
  color: #cfdae6; font-size: 12px; margin-top: 4px; opacity: 0.7;
}
.slide-header-left .subtitle-italic {
  color: #cfdae6; font-size: 11px; margin-top: 4px; opacity: 0.6; font-style: italic;
}
.slide-header-right { text-align: right; }
.slide-header-right p { color: #cfdae6; font-size: 12px; line-height: 1.6; }

.slide-body { background: #f6f2e7; padding: 32px 40px; }

.slide-footer {
  background: #142f48; padding: 12px 40px;
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid rgba(207,218,230,0.15);
}
.slide-footer p { color: #cfdae6; font-size: 11px; opacity: 0.6; }

/* WS1 Kickoff specific */
.ws1-total { text-align: center; padding: 20px 40px 4px; }
.ws1-total .big { font-size: 36px; font-weight: 600; color: #feda37; }
.ws1-total .of { font-size: 14px; color: #cfdae6; opacity: 0.7; }

.ws1-bars { padding: 8px 40px 16px; }
.ws1-dim { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
.ws1-dim-label { min-width: 170px; text-align: right; font-size: 12px; color: #cfdae6; }
.ws1-dim-track { flex: 1; height: 14px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
.ws1-dim-fill { height: 100%; border-radius: 3px; }
.ws1-dim-score { min-width: 32px; text-align: center; font-size: 12px; font-weight: 600; }

.ws1-focus { display: flex; gap: 12px; padding: 4px 40px 16px; }
.ws1-focus-box { flex: 1; border-radius: 6px; padding: 12px 14px; }
.ws1-focus-title { font-weight: 600; font-size: 12px; margin-bottom: 6px; }
.ws1-tag { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 11px; margin: 2px 4px 2px 0; font-weight: 500; color: #f6f2e7; }

.ws1-scale { padding: 0 40px 16px; text-align: center; font-size: 10px; color: #cfdae6; opacity: 0.6; }

/* WS2 Recap specific */
.ws2-body { padding: 16px 40px 20px; }
.ws2-qbox { border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; text-align: center; color: #f6f2e7; font-style: italic; opacity: 0.85; line-height: 1.5; }
.ws2-content { display: flex; gap: 20px; align-items: flex-start; }
.ws2-bars-col { flex: 1; }
.ws2-bars-title { font-size: 13px; font-weight: 600; color: #f6f2e7; margin: 0 0 10px; opacity: 0.8; }
.ws2-dim { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ws2-dim-label { min-width: 170px; font-size: 12px; color: #f6f2e7; font-weight: 500; }
.ws2-dim-track { flex: 1; height: 18px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
.ws2-dim-fill { height: 100%; border-radius: 3px; }
.ws2-dim-score { min-width: 40px; text-align: right; font-size: 12px; color: #cfdae6; }
.ws2-info { margin-top: 14px; padding: 10px 12px; border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; font-size: 10px; color: #cfdae6; opacity: 0.75; line-height: 1.7; }
.ws2-stickies { display: flex; flex-direction: column; gap: 8px; min-width: 140px; }
.ws2-sticky { padding: 10px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; text-align: center; }

/* WS3 Analyse specific */
.ws3-chart { display: flex; justify-content: center; padding: 12px 40px 20px; }

/* WS4 Final specific */
.ws4-body { padding: 16px 40px 20px; }
.ws4-content { display: flex; gap: 24px; align-items: flex-start; }
.ws4-bars-col { flex: 1; }
.ws4-dim { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.ws4-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.ws4-dim-name { min-width: 170px; font-size: 13px; color: #f6f2e7; }
.ws4-dim-track { flex: 1; height: 16px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
.ws4-dim-fill { height: 100%; border-radius: 3px; }
.ws4-dim-score { min-width: 32px; text-align: right; font-size: 13px; font-weight: 600; color: #f6f2e7; }
.ws4-badge { font-size: 11px; font-weight: 500; min-width: 110px; }
.ws4-legend { display: flex; gap: 18px; font-size: 10px; color: #cfdae6; opacity: 0.65; margin-top: 14px; align-items: center; }
.ws4-legend-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.ws4-scorebox { background: rgba(255,255,255,0.08); border-radius: 8px; padding: 18px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 110px; }
.ws4-scorebox .big { font-size: 36px; font-weight: 600; color: #feda37; line-height: 1; }
.ws4-scorebox .lbl { font-size: 11px; color: #cfdae6; opacity: 0.6; margin-top: 6px; }
.ws4-deutung { padding: 16px 0 0; margin-top: 16px; border-top: 1px solid rgba(255,255,255,0.12); font-size: 12px; color: #f6f2e7; line-height: 1.7; }
.ws4-deutung-title { font-weight: 600; margin-bottom: 4px; font-size: 13px; }

/* Default view (original) */
.content-grid { display: flex; gap: 32px; align-items: flex-start; }
.chart-col { flex: 1; display: flex; justify-content: center; align-items: center; }
.bars-col { flex: 0 0 300px; }
.bars-col h3 { font-family: 'Gilda Display', serif; font-size: 16px; color: #142f48; margin-bottom: 16px; font-weight: 400; }
.dim-bar { margin-bottom: 14px; }
.dim-bar-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
.dim-bar-header .dim-name { color: #142f48; font-weight: 600; }
.dim-bar-header .dim-score { color: #888; }
.dim-bar-track { background: #cfdae6; border-radius: 4px; height: 8px; overflow: hidden; }
.dim-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.legend { margin-top: 20px; padding-top: 14px; border-top: 1px solid #cfdae6; display: flex; gap: 14px; font-size: 11px; color: #555; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }
.radar-label { font-family: 'Open Sans', sans-serif; font-size: 11px; fill: #142f48; font-weight: 600; }
.radar-score { font-family: 'Open Sans', sans-serif; font-size: 10px; fill: #888; }

.no-data { text-align: center; padding: 80px 40px; color: #142f48; }
.no-data h2 { font-family: 'Gilda Display', serif; font-size: 24px; margin-bottom: 12px; font-weight: 400; }
.no-data p { font-size: 14px; color: #555; line-height: 1.8; }
.no-data code { background: #cfdae6; padding: 2px 8px; border-radius: 4px; font-size: 12px; }

@media print {
  body { background: white; padding: 0; }
  .toolbar { display: none !important; }
  .slide { box-shadow: none; }
}
</style>
</head>
<body>

<div class="toolbar" id="toolbar">
  <button onclick="downloadImage()">Diese View als PNG</button>
  <button onclick="downloadAllViews()">Alle 4 Workshop-PNGs</button>
  <button onclick="window.print()">Drucken / PDF</button>
</div>
<div id="download-status" style="display:none;margin-bottom:12px;padding:10px 20px;background:#142f48;color:#feda37;border-radius:6px;font-size:13px;font-weight:600;"></div>

<div class="slide" id="slide"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const params = new URLSearchParams(window.location.search);

const data = {
  name: params.get('name') || '',
  firma: params.get('firma') || '',
  rolle: params.get('rolle') || '',
  email: params.get('email') || '',
  team: params.get('team') || '',
  p: parseInt(params.get('p')) || 0,
  d: parseInt(params.get('d')) || 0,
  c: parseInt(params.get('c')) || 0,
  ds: parseInt(params.get('ds')) || 0,
  t: parseInt(params.get('t')) || 0,
  k: parseInt(params.get('k')) || 0,
  total: parseInt(params.get('total')) || 0,
  status: params.get('status') || '',
  view: params.get('view') || ''
};

const DIMENSIONS = [
  { key: 'p', label: 'Prozessklarheit', lines: ['Prozess-', 'klarheit'] },
  { key: 'd', label: 'Digitalisierung & Tools', lines: ['Digitalisierung', '& Tools'] },
  { key: 'c', label: 'Candidate Experience', lines: ['Candidate', 'Experience'] },
  { key: 'ds', label: 'Datenbasierte Steuerung', lines: ['Datenbasierte', 'Steuerung'] },
  { key: 't', label: 'Team & Kompetenzen', lines: ['Team &', 'Kompetenzen'] },
  { key: 'k', label: 'Kulturelle Verankerung', lines: ['Kulturelle', 'Verankerung'] }
];

/* ── Helpers ── */
function getScores() {
  return [data.p, data.d, data.c, data.ds, data.t, data.k];
}

function getAvg(score) { return score / 5; }

function getGesamtreifegrad() {
  const scores = getScores();
  const sum = scores.reduce((a, b) => a + b, 0);
  return (sum / 30).toFixed(1);
}

function getCategoryColor(avg) {
  if (avg < 2) return '#c74f62';
  if (avg < 3) return '#feda37';
  return '#4aba70';
}

function getCategoryLabel(avg) {
  if (avg < 2) return 'Entwicklungsfeld';
  if (avg < 3) return 'Ausbauf\u00e4hig';
  return 'St\u00e4rke';
}

/* WS4 uses rounded scores (1-4) for cleaner management logic */
function getWS4CategoryColor(roundedScore) {
  if (roundedScore <= 1) return '#c74f62';
  if (roundedScore <= 3) return '#feda37';
  return '#4aba70';
}

function getWS4CategoryLabel(roundedScore) {
  if (roundedScore <= 1) return 'Entwicklungsfeld';
  if (roundedScore <= 3) return 'Ausbauf\u00e4hig';
  return 'St\u00e4rke';
}

function formatMonthYear() {
  const months = ['Januar','Februar','M\u00e4rz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const d = new Date();
  return `${months[d.getMonth()]} ${d.getFullYear()}`;
}

function getDimResults() {
  const scores = getScores();
  return DIMENSIONS.map((dim, i) => {
    const score = scores[i];
    const avg = getAvg(score);
    const color = getCategoryColor(avg);
    const category = getCategoryLabel(avg);
    return { ...dim, score, avg, color, category };
  });
}

function joinDimNames(dims) {
  if (dims.length === 1) return dims[0].label;
  if (dims.length === 2) return dims[0].label + ' sowie ' + dims[1].label;
  return dims.slice(0, -1).map(d => d.label).join(', ') + ' sowie ' + dims[dims.length - 1].label;
}

function buildDeutungsText(dimResults) {
  const sorted = [...dimResults].sort((a, b) => b.avg - a.avg);
  const staerken = sorted.filter(d => d.category === 'St\u00e4rke');
  const ausbau = sorted.filter(d => d.category === 'Ausbauf\u00e4hig');
  const entwicklung = sorted.filter(d => d.category === 'Entwicklungsfeld');

  const parts = [];
  if (staerken.length) parts.push('St\u00e4rken liegen in ' + joinDimNames(staerken) + '.');
  if (ausbau.length) parts.push('Ausbauf\u00e4hige Bereiche sind ' + joinDimNames(ausbau) + '.');
  if (entwicklung.length) parts.push('Entwicklungsfelder sind ' + joinDimNames(entwicklung) + '.');

  if (entwicklung.length > 0 && ausbau.length > 0) {
    const bridge = ausbau[ausbau.length - 1];
    parts.push('F\u00fcr die weitere Entwicklung empfiehlt sich, zuerst die Entwicklungsfelder anzugehen und ' + bridge.label + ' als verbindendes Handlungsfeld mitzudenken.');
  } else if (entwicklung.length > 0) {
    parts.push('F\u00fcr die weitere Entwicklung empfiehlt sich, zuerst die Entwicklungsfelder systematisch anzugehen.');
  } else if (ausbau.length > 0) {
    parts.push('F\u00fcr die weitere Entwicklung empfiehlt sich, die ausbauf\u00e4higen Bereiche gezielt weiterzuentwickeln.');
  }

  return parts.join('<br>');
}

function getDiagnosticText(key, score) {
  const avg = score / 5;
  const texts = {
    p: {
      low: 'Recruiting-Prozesse sind nicht dokumentiert oder werden nicht einheitlich gelebt. Im Workshop kl\u00e4ren wir: Wo entstehen Br\u00fcche?',
      mid: 'Grundstrukturen vorhanden, aber \u00dcbergaben und Entscheidungswege sind noch nicht durchg\u00e4ngig definiert.',
      high: 'Prozesse sind klar strukturiert und werden aktiv genutzt. Potenzial liegt in der kontinuierlichen Optimierung.'
    },
    d: {
      low: 'Toollandschaft ist fragmentiert, manuelle Schritte dominieren. Leitfrage: Wo verlieren wir t\u00e4glich Zeit durch fehlende Automatisierung?',
      mid: 'Einzelne Tools im Einsatz, aber nicht durchg\u00e4ngig vernetzt. Daten werden teilweise manuell \u00fcbertragen.',
      high: 'Tools sind integriert und Automatisierung ist etabliert. N\u00e4chster Hebel: KI-gest\u00fctzte Optimierung.'
    },
    c: {
      low: 'Bewerbererlebnis ist nicht gesteuert. Leitfrage: An welchen Stellen verlieren wir Kandidaten, ohne es zu merken?',
      mid: 'Grundlegende Candidate Journey existiert, aber Feedback-Schleifen und Transparenz sind ausbauf\u00e4hig.',
      high: 'Positive Candidate Experience wird aktiv gestaltet und gemessen.'
    },
    ds: {
      low: 'Recruiting-Entscheidungen basieren auf Bauchgef\u00fchl. Leitfrage: Welche drei Kennzahlen w\u00fcrden uns am meisten helfen?',
      mid: 'Einzelne KPIs werden erhoben, aber nicht systematisch zur Steuerung genutzt.',
      high: 'Datenbasierte Steuerung ist etabliert. Potenzial liegt im Benchmarking und der strategischen Nutzung.'
    },
    t: {
      low: 'Recruiting wird nebenbei erledigt, Kompetenzen sind nicht gezielt aufgebaut. Leitfrage: Wer tr\u00e4gt die Verantwortung?',
      mid: 'Dedizierte Rollen vorhanden, aber strategische Kapazit\u00e4ten und Weiterentwicklung fehlen.',
      high: 'Team ist kompetent aufgestellt und arbeitet strategisch.'
    },
    k: {
      low: 'Recruiting wird als reine HR-Aufgabe gesehen. Leitfrage: Wie involviert ist die Gesch\u00e4ftsf\u00fchrung wirklich?',
      mid: 'Bewusstsein w\u00e4chst, aber Recruiting ist noch nicht als strategisches Thema verankert.',
      high: 'Recruiting ist als gemeinsame Verantwortung anerkannt und strategisch verankert.'
    }
  };
  const t = texts[key] || texts.p;
  if (avg < 2) return t.low;
  if (avg < 3) return t.mid;
  return t.high;
}

/* ── Radar Chart SVG Builder ── */
function buildRadarSVG(scores, opts) {
  const maxR = opts.maxR || 130;
  const w = opts.width || 420;
  const h = opts.height || 400;
  const cx = w / 2;
  const cy = h / 2;
  const n = 6;
  const isDark = opts.dark !== false;

  const lineColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(207,218,230,0.6)';
  const labelColor = isDark ? '#cfdae6' : '#142f48';
  const scoreColor = isDark ? '#feda37' : '#888';
  const fillColor = isDark ? 'rgba(254,218,55,0.2)' : 'rgba(20,47,72,0.15)';
  const strokeColor = isDark ? '#feda37' : '#142f48';

  function polarXY(angle, r) {
    return { x: Math.cos(angle) * r, y: Math.sin(angle) * r };
  }

  const padX = 60;
  const padY = 40;
  let svg = `<svg viewBox="${-padX} ${-padY} ${w + padX*2} ${h + padY*2}" style="width:100%;max-width:${w + padX*2}px;" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<g transform="translate(${cx},${cy})">`;

  for (let lvl = 1; lvl <= 4; lvl++) {
    const pts = [];
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
      const r = (lvl / 4) * maxR;
      pts.push(polarXY(angle, r));
    }
    svg += `<polygon points="${pts.map(p => p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ')}" fill="none" stroke="${lineColor}" stroke-width="0.5"/>`;
  }

  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    const ep = polarXY(angle, maxR);
    svg += `<line x1="0" y1="0" x2="${ep.x.toFixed(1)}" y2="${ep.y.toFixed(1)}" stroke="${lineColor}" stroke-width="0.5"/>`;
  }

  const dataPts = scores.map((score, i) => {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    const r = (score / 20) * maxR;
    return polarXY(angle, r);
  });
  svg += `<polygon points="${dataPts.map(p => p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ')}" fill="${fillColor}" stroke="${strokeColor}" stroke-width="1.5"/>`;

  dataPts.forEach(p => {
    svg += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="${strokeColor}"/>`;
  });

  const labelPositions = [
    { dx: 0, dy: -maxR - 20, anchor: 'middle' },
    { dx: maxR + 24, dy: -maxR/2 + 2, anchor: 'start' },
    { dx: maxR + 24, dy: maxR/2 + 2, anchor: 'start' },
    { dx: 0, dy: maxR + 28, anchor: 'middle' },
    { dx: -maxR - 24, dy: maxR/2 + 2, anchor: 'end' },
    { dx: -maxR - 24, dy: -maxR/2 + 2, anchor: 'end' }
  ];

  DIMENSIONS.forEach((dim, i) => {
    const pos = labelPositions[i];
    svg += `<text font-family="Open Sans,sans-serif" font-size="11" fill="${labelColor}" font-weight="600" x="${pos.dx}" y="${pos.dy - 12}" text-anchor="${pos.anchor}">${dim.lines[0]}</text>`;
    svg += `<text font-family="Open Sans,sans-serif" font-size="11" fill="${labelColor}" font-weight="600" x="${pos.dx}" y="${pos.dy}" text-anchor="${pos.anchor}">${dim.lines[1]}</text>`;
    svg += `<text font-family="Open Sans,sans-serif" font-size="10" fill="${scoreColor}" font-weight="600" x="${pos.dx}" y="${pos.dy + 13}" text-anchor="${pos.anchor}">${getAvg(scores[i]).toFixed(1)}</text>`;
  });

  svg += '</g></svg>';
  return svg;
}

/* ── WS1: Kick-off ── */
function renderKickoff() {
  const slide = document.getElementById('slide');
  const scores = getScores();
  const dimResults = getDimResults();
  const reifegrad = getGesamtreifegrad();
  const sorted = [...dimResults].sort((a, b) => a.avg - b.avg);
  const handlungsfelder = sorted.filter(d => d.avg < 2.5).slice(0, 2);
  const staerken = sorted.filter(d => d.avg >= 2.5).slice(-2).reverse();
  if (handlungsfelder.length === 0) { handlungsfelder.push(sorted[0], sorted[1]); }
  if (staerken.length === 0) { staerken.push(sorted[sorted.length-1], sorted[sorted.length-2]); }

  let barsHTML = '';
  dimResults.forEach(d => {
    const pct = (d.score / 20) * 100;
    barsHTML += `
      <div class="ws1-dim">
        <span class="ws1-dim-label">${d.label}</span>
        <div class="ws1-dim-track"><div class="ws1-dim-fill" style="width:${pct}%;background:${d.color};"></div></div>
        <span class="ws1-dim-score" style="color:${d.color}">${d.avg.toFixed(1)}</span>
      </div>`;
  });

  slide.innerHTML = `
    <div class="slide-header">
      <div class="slide-header-left">
        <h1>Recruiting-Scorecard</h1>
        <p class="subtitle">${data.firma} | ${formatMonthYear()}</p>
      </div>
      <div class="slide-header-right">
        <p>WS1 Kick-off</p>
      </div>
    </div>

    <div class="ws1-total">
      <span class="big">${reifegrad.replace('.', ',')}</span>
      <span class="of"> / 4,0 Gesamtreifegrad</span>
    </div>

    <div class="ws1-bars">${barsHTML}</div>

    <div class="ws1-focus">
      <div class="ws1-focus-box" style="background:rgba(199,79,98,0.15);border-left:3px solid #c74f62;">
        <div class="ws1-focus-title" style="color:#c74f62;">Handlungsfelder</div>
        ${handlungsfelder.map(d => `<span class="ws1-tag" style="background:rgba(199,79,98,0.25);">${d.label}</span>`).join('')}
      </div>
      <div class="ws1-focus-box" style="background:rgba(74,186,112,0.12);border-left:3px solid #4aba70;">
        <div class="ws1-focus-title" style="color:#4aba70;">St\u00e4rken</div>
        ${staerken.map(d => `<span class="ws1-tag" style="background:rgba(74,186,112,0.2);">${d.label}</span>`).join('')}
      </div>
    </div>

/* ── WS4: Ergebnispräsentation ── */
function renderFinal() {
  const slide = document.getElementById('slide');
  const dimResults = getDimResults();
  const reifegrad = getGesamtreifegrad();

  const sorted = [...dimResults].sort((a, b) => b.avg - a.avg);

  let barsHTML = '';
  sorted.forEach(d => {
    const roundedAvg = Math.round(d.avg);
    const pct = (roundedAvg / 4) * 100;
    const ws4Color = getWS4CategoryColor(roundedAvg);
    const ws4Label = getWS4CategoryLabel(roundedAvg);
    barsHTML += `
      <div class="ws4-dim">
        <span class="ws4-dot" style="background:${ws4Color}"></span>
        <span class="ws4-dim-name">${d.label}</span>
        <div class="ws4-dim-track"><div class="ws4-dim-fill" style="width:${pct}%;background:${ws4Color};"></div></div>
        <span class="ws4-dim-score">${roundedAvg}/4</span>
        <span class="ws4-badge" style="color:${ws4Color}">${ws4Label}</span>
      </div>`;
  });

  /* WS4 Deutungstext uses WS4 logic (rounded scores) */
  const ws4DimResults = sorted.map(d => {
    const roundedAvg = Math.round(d.avg);
    return { ...d, category: getWS4CategoryLabel(roundedAvg), color: getWS4CategoryColor(roundedAvg) };
  });
  const deutung = buildDeutungsText(ws4DimResults);

  slide.innerHTML = `
    <div class="slide-header">
      <div class="slide-header-left">
        <p class="label">Validierte Bewertung</p>
        <h1>Finaler Reifegrad | Recruiting-System</h1>
        <p class="subtitle-italic">Auf Basis von Scorecard, Prozessanalyse und Medienbruch-Scan</p>
      </div>
      <div class="slide-header-right">
        <p>${data.firma}</p>
        <p>Ergebnispr\u00e4sentation</p>
      </div>
    </div>

    <div class="ws4-body">
      <div class="ws4-content">
        <div class="ws4-bars-col">
          ${barsHTML}
          <div class="ws4-legend">
            <span><span class="ws4-legend-dot" style="background:#4aba70"></span>St\u00e4rke (4)</span>
            <span><span class="ws4-legend-dot" style="background:#feda37"></span>Ausbauf\u00e4hig (2\u20133)</span>
            <span><span class="ws4-legend-dot" style="background:#c74f62"></span>Entwicklungsfeld (1)</span>
            <span style="margin-left:8px;">Skala 1\u20134 | 30 Fragen, 6 Dimensionen</span>
          </div>
        </div>
        <div class="ws4-scorebox">
          <span class="big">${reifegrad.replace('.', ',')}</span>
          <span class="lbl">/ 4,0<br>Gesamtreifegrad</span>
        </div>
      </div>
      <div class="ws4-deutung">
        <div class="ws4-deutung-title">Was das bedeutet:</div>
        ${deutung}

    <div class="slide-footer">
      <p>HiringLab | Recruiting-Architektur</p>
      <p>Ergebnispr\u00e4sentation (WS4)</p>
    </div>`;
}

/* ── Router ── */
function render() {
  const view = data.view.toLowerCase();
  switch (view) {
    case 'kickoff': renderKickoff(); break;
    case 'recap': renderRecap(); break;
    case 'analyse': renderAnalyse(); break;
    case 'final': renderFinal(); break;
    default: renderDefault(); break;
  }
}

/* ── PNG Download (einzeln) ── */
function downloadImage() {
  const el = document.getElementById('slide');
  const toolbar = document.getElementById('toolbar');
  const status = document.getElementById('download-status');
  toolbar.style.display = 'none';
  status.style.display = 'none';
  html2canvas(el, { scale: 2, useCORS: true, backgroundColor: null }).then(canvas => {
    toolbar.style.display = 'flex';
    const viewLabel = data.view || 'Ergebnis';
    const link = document.createElement('a');
    link.download = `Diagnose-Check_${data.firma || 'Ergebnis'}_${viewLabel}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(() => { toolbar.style.display = 'flex'; });
}

/* ── Alle 4 Workshop-PNGs nacheinander ── */
async function downloadAllViews() {
  const views = [
    { id: 'kickoff', render: renderKickoff, label: 'WS1_Kickoff' },
    { id: 'recap', render: renderRecap, label: 'WS2_Recap' },
    { id: 'analyse', render: renderAnalyse, label: 'WS3_Analyse' },
    { id: 'final', render: renderFinal, label: 'WS4_Final' }
  ];

  const el = document.getElementById('slide');
  const toolbar = document.getElementById('toolbar');
  const status = document.getElementById('download-status');
  toolbar.style.display = 'none';
  status.style.display = 'block';

  for (let i = 0; i < views.length; i++) {
    const v = views[i];
    status.textContent = `Erstelle PNG ${i + 1} / 4: ${v.label} ...`;

    v.render();

    await new Promise(r => setTimeout(r, 300));

    try {
      const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: null });
      const link = document.createElement('a');
      link.download = `Diagnose-Check_${data.firma || 'Ergebnis'}_${v.label}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      await new Promise(r => setTimeout(r, 500));
    } catch (e) {
      console.error('Fehler bei ' + v.label, e);
    }
  }

  status.textContent = 'Alle 4 PNGs erstellt!';
  toolbar.style.display = 'flex';

  setTimeout(() => { status.style.display = 'none'; render(); }, 2000);
}

render();
</script>
