<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnose-Check Ergebnis | HiringLab</title>
<link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #e8e4dc; font-family: 'Open Sans', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 24px; min-height: 100vh; }

.toolbar { display: flex; gap: 12px; margin-bottom: 20px; }
.toolbar button {
  background: #142f48; color: #fff; border: none; padding: 10px 24px;
  border-radius: 6px; font-family: 'Open Sans', sans-serif; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: background 0.2s;
}
.toolbar button:hover { background: #1d4268; }

.slide {
  width: 960px; background: #142f48; border-radius: 0; overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.15);
}

.slide-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 32px 40px 0;
}
.slide-header-left { flex: 1; }
.slide-header-logo { height: 48px; width: auto; }
.slide-header-left .label {
  color: #cfdae6; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;
}
.slide-header-left h1 {
  font-family: 'Gilda Display', serif; color: #ffffff; font-size: 28px; font-weight: 400;
}
.slide-header-right { text-align: right; }
.slide-header-right p { color: #cfdae6; font-size: 13px; line-height: 1.6; }

.status-row {
  display: flex; align-items: center; gap: 12px; padding: 16px 40px;
}
.status-badge {
  color: #fff; font-size: 12px; font-weight: 700; padding: 4px 14px;
  border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase;
}
.status-row .score-text { color: #cfdae6; font-size: 14px; }

.slide-body { background: #f6f2e7; padding: 32px 40px; }

.content-grid { display: flex; gap: 32px; align-items: flex-start; }
.chart-col { flex: 1; display: flex; justify-content: center; align-items: center; }
.bars-col { flex: 0 0 300px; }

.bars-col h3 {
  font-family: 'Gilda Display', serif; font-size: 16px; color: #142f48;
  margin-bottom: 16px; font-weight: 400;
}

.dim-bar { margin-bottom: 14px; }
.dim-bar-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
.dim-bar-header .dim-name { color: #142f48; font-weight: 600; }
.dim-bar-header .dim-score { color: #888; }
.dim-bar-track { background: #cfdae6; border-radius: 4px; height: 8px; overflow: hidden; }
.dim-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

.legend {
  margin-top: 20px; padding-top: 14px; border-top: 1px solid #cfdae6;
  display: flex; gap: 14px; font-size: 11px; color: #555;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }

.focus-box {
  margin-top: 24px; padding: 20px; background: #ffffff; border-radius: 8px;
  border-left: 4px solid #c74f62;
}
.focus-box h3 {
  font-family: 'Gilda Display', serif; font-size: 15px; color: #142f48;
  margin-bottom: 8px; font-weight: 400;
}
.focus-box p { font-size: 13px; color: #142f48; line-height: 1.6; }

.slide-footer {
  background: #142f48; padding: 12px 40px;
  display: flex; justify-content: space-between; align-items: center;
}
.slide-footer p { color: #cfdae6; font-size: 11px; }

.radar-label { font-family: 'Open Sans', sans-serif; font-size: 11px; fill: #142f48; font-weight: 600; }
.radar-score { font-family: 'Open Sans', sans-serif; font-size: 10px; fill: #888; }

.no-data {
  text-align: center; padding: 80px 40px; color: #142f48;
}
.no-data h2 { font-family: 'Gilda Display', serif; font-size: 24px; margin-bottom: 12px; font-weight: 400; }
.no-data p { font-size: 14px; color: #555; line-height: 1.8; }
.no-data code { background: #cfdae6; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>

<div class="toolbar" id="toolbar">
  <button onclick="downloadImage()">Als PNG speichern</button>
  <button onclick="window.print()">Drucken / PDF</button>
</div>

<div class="slide" id="slide"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const params = new URLSearchParams(window.location.search);

const data = {
  name: params.get('name') || '',
  firma: params.get('firma') || '',
  rolle: params.get('rolle') || '',
  email: params.get('email') || '',
  team: params.get('team') || '',
  p: parseInt(params.get('p')) || 0,
  d: parseInt(params.get('d')) || 0,
  c: parseInt(params.get('c')) || 0,
  ds: parseInt(params.get('ds')) || 0,
  t: parseInt(params.get('t')) || 0,
  k: parseInt(params.get('k')) || 0,
  total: parseInt(params.get('total')) || 0,
  status: params.get('status') || ''
};

const DIMENSIONS = [
  { key: 'p', label: 'Prozessklarheit', short: 'Prozessklarheit' },
  { key: 'd', label: 'Digitalisierung & Tools', short: 'Digitalisierung' },
  { key: 'c', label: 'Candidate Experience', short: 'Candidate Exp.' },
  { key: 'ds', label: 'Datenbasierte Steuerung', short: 'Datenbasierte St.' },
  { key: 't', label: 'Team & Kompetenzen', short: 'Team & Komp.' },
  { key: 'k', label: 'Kulturelle Verankerung', short: 'Kulturelle Verank.' }
];

function getBarColor(score) {
  const avg = score / 5;
  if (avg < 2) return '#c74f62';
  if (avg < 3) return '#feda37';
  if (avg < 3.6) return '#142f48';
  return '#142f48';
}

function getStatusColor(status) {
  const s = status.toUpperCase();
  if (s.includes('KRITISCH')) return '#c74f62';
  if (s.includes('ENTWICKLUNG')) return '#c74f62';
  if (s.includes('OPTIMIERUNG')) return '#feda37';
  if (s.includes('STARK')) return '#2a7d4f';
  return '#c74f62';
}

function getStatusLabel(status) {
  const s = status.toUpperCase();
  if (s.includes('KRITISCH')) return 'Kritisch';
  if (s.includes('ENTWICKLUNG')) return 'Entwicklungsbedarf';
  if (s.includes('OPTIMIERUNG')) return 'Optimierungspotenzial';
  if (s.includes('STARK')) return 'Stark';
  return status;
}

function buildRadarPoints(scores, maxRadius) {
  const n = scores.length;
  return scores.map((score, i) => {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    const r = (score / 20) * maxRadius;
    return { x: Math.cos(angle) * r, y: Math.sin(angle) * r };
  });
}

function buildGridPoints(level, maxRadius, n) {
  const points = [];
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    const r = (level / 4) * maxRadius;
    points.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
  }
  return points;
}

function pointsToString(pts) {
  return pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
}

function formatDate() {
  const d = new Date();
  const months = ['Januar','Februar','M\u00e4rz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  return `${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function render() {
  const slide = document.getElementById('slide');

  if (!data.name && !data.firma) {
    slide.innerHTML = `
      <div class="slide-body">
        <div class="no-data">
          <h2>Diagnose-Check Ergebnis</h2>
          <p>Keine Daten gefunden. Die Seite erwartet URL-Parameter.</p>
          <p style="margin-top: 16px;">Beispiel:</p>
          <p><code>?name=M%C3%BCller&firma=ACME&p=8&d=7&c=13&ds=13&t=15&k=15&total=71&status=ENTWICKLUNGSBEDARF</code></p>
          <p style="margin-top: 16px;">Parameter: name, firma, rolle, email, team, p, d, c, ds, t, k, total, status</p>
        </div>
      </div>`;
    return;
  }

  const scores = [data.p, data.d, data.c, data.ds, data.t, data.k];
  const maxR = 140;
  const cx = 200, cy = 185;

  const radarPts = buildRadarPoints(scores, maxR);
  const radarStr = pointsToString(radarPts);

  let gridSVG = '';
  for (let lvl = 1; lvl <= 4; lvl++) {
    const gPts = buildGridPoints(lvl, maxR, 6);
    gridSVG += `<polygon points="${pointsToString(gPts)}" fill="none" stroke="#cfdae6" stroke-width="0.5" opacity="0.6"/>`;
  }

  let axesSVG = '';
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI * 2 * i) / 6 - Math.PI / 2;
    const ex = Math.cos(angle) * maxR;
    const ey = Math.sin(angle) * maxR;
    axesSVG += `<line x1="0" y1="0" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}" stroke="#cfdae6" stroke-width="0.5"/>`;
  }

  let dotsSVG = '';
  radarPts.forEach((pt, i) => {
    const col = getBarColor(scores[i]);
    dotsSVG += `<circle cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="4" fill="${col}"/>`;
  });

  const labelPositions = [
    { dx: 0, dy: -maxR - 18, anchor: 'middle' },
    { dx: maxR + 16, dy: -maxR/2 + 5, anchor: 'start' },
    { dx: maxR + 16, dy: maxR/2 + 5, anchor: 'start' },
    { dx: 0, dy: maxR + 24, anchor: 'middle' },
    { dx: -maxR - 16, dy: maxR/2 + 5, anchor: 'end' },
    { dx: -maxR - 16, dy: -maxR/2 + 5, anchor: 'end' }
  ];

  let labelsSVG = '';
  DIMENSIONS.forEach((dim, i) => {
    const pos = labelPositions[i];
    labelsSVG += `<text class="radar-label" x="${pos.dx}" y="${pos.dy}" text-anchor="${pos.anchor}">${dim.short}</text>`;
    labelsSVG += `<text class="radar-score" x="${pos.dx}" y="${pos.dy + 12}" text-anchor="${pos.anchor}">${scores[i]} / 20</text>`;
  });

  const sorted = DIMENSIONS.map((dim, i) => ({ ...dim, score: scores[i] })).sort((a, b) => a.score - b.score);
  const fokus = sorted.slice(0, 2);
  const fokusText = fokus.map(f => `<strong>${f.label}</strong> (${f.score}/20)`).join(' und ');

  let barsHTML = '';
  DIMENSIONS.forEach((dim, i) => {
    const score = scores[i];
    const pct = (score / 20) * 100;
    const col = getBarColor(score);
    barsHTML += `
      <div class="dim-bar">
        <div class="dim-bar-header">
          <span class="dim-name">${dim.label}</span>
          <span class="dim-score">${score} / 20</span>
        </div>
        <div class="dim-bar-track">
          <div class="dim-bar-fill" style="width:${pct}%; background:${col};"></div>
        </div>
      </div>`;
  });

  const pct = data.total > 0 ? Math.round((data.total / 120) * 100) : 0;
  const statusColor = getStatusColor(data.status);
  const statusLabel = getStatusLabel(data.status);

  slide.innerHTML = `
    <div class="slide-header">
      <div class="slide-header-left">
        <p class="label">Diagnose-Check</p>
        <h1>Standortbestimmung Recruiting</h1>
      </div>
      <div class="slide-header-right">
        <img src="logo-hell.svg" class="slide-header-logo" alt="HiringLab" onerror="this.style.display='none'">
        <p>${data.name}${data.firma ? ' | ' + data.firma : ''}</p>
        <p>${formatDate()}</p>
      </div>
    </div>

    <div class="status-row">
      <div class="status-badge" style="background:${statusColor};">${statusLabel}</div>
      <span class="score-text">Gesamtscore: ${data.total} / 120 Punkte (${pct}%)</span>
    </div>

    <div class="slide-body">
      <div class="content-grid">
        <div class="chart-col">
          <svg viewBox="0 0 400 380" style="width:100%; max-width:400px;">
            <g transform="translate(${cx},${cy})">
              ${gridSVG}
              ${axesSVG}
              <polygon points="${radarStr}" fill="rgba(20,47,72,0.15)" stroke="#142f48" stroke-width="2"/>
              ${dotsSVG}
              ${labelsSVG}
            </g>
          </svg>
        </div>
        <div class="bars-col">
          <h3>Ergebnis nach Dimension</h3>
          ${barsHTML}
          <div class="legend">
            <div class="legend-item"><span class="legend-dot" style="background:#c74f62;"></span> Kritisch (&lt;2.0)</div>
            <div class="legend-item"><span class="legend-dot" style="background:#feda37;"></span> Entwicklung (&lt;3.0)</div>
            <div class="legend-item"><span class="legend-dot" style="background:#142f48;"></span> Stark (&ge;3.0)</div>
          </div>
        </div>
      </div>

      <div class="focus-box">
        <h3>Fokusfelder im Workshop</h3>
        <p>${fokusText} zeigen den gr\u00f6\u00dften Handlungsbedarf. Hier setzen wir im Prozess-Workshop (WS2) und in der Analyse (WS3) den Schwerpunkt.</p>
      </div>
    </div>

    <div class="slide-footer">
      <p>HiringLab | Recruiting-Architektur</p>
      <p>Kick-off Workshop (WS1) | Vertraulich</p>
    </div>`;
}

function downloadImage() {
  const el = document.getElementById('slide');
  const toolbar = document.getElementById('toolbar');
  toolbar.style.display = 'none';
  html2canvas(el, { scale: 2, useCORS: true, backgroundColor: null }).then(canvas => {
    toolbar.style.display = 'flex';
    const link = document.createElement('a');
    link.download = `Diagnose-Check_${data.firma || 'Ergebnis'}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(() => { toolbar.style.display = 'flex'; });
}

render();
</script>

<style>
@media print {
  body { background: white; padding: 0; }
  .toolbar { display: none !important; }
  .slide { box-shadow: none; }
}
</style>

</body>
</html>
