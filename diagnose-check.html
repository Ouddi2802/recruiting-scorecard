<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnose-Check | HiringLab</title>
<link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #142f48;
  --soft-blue: #cfdae6;
  --beige: #f6f2e7;
  --red: #c74f62;
  --yellow: #feda37;
  --white: #ffffff;
  --text: #142f48;
  --text-light: #5a6d7e;
  --border: #dde4eb;
}
body {
  font-family: 'Open Sans', sans-serif;
  background: var(--beige);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Header ── */
.site-header {
  background: var(--navy);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.site-header .logo {
  font-family: 'Gilda Display', serif;
  font-size: 24px;
  color: var(--white);
  letter-spacing: 1px;
}
.site-header .badge {
  font-size: 13px;
  color: var(--soft-blue);
  background: rgba(207,218,230,0.15);
  padding: 6px 14px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}

/* ── Container ── */
.container {
  max-width: 820px;
  margin: 0 auto;
  padding: 40px 20px 60px;
}

/* ── Intro Section ── */
.intro {
  text-align: center;
  margin-bottom: 48px;
}
.intro h1 {
  font-family: 'Gilda Display', serif;
  font-size: 36px;
  color: var(--navy);
  margin-bottom: 12px;
  font-weight: 400;
}
.intro p {
  font-size: 17px;
  color: var(--text-light);
  max-width: 600px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ── Step Indicator ── */
.step-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin-bottom: 12px;
}
.step-dot {
  width: 32px;
  height: 4px;
  border-radius: 2px;
  background: var(--soft-blue);
  transition: background 0.3s;
}
.step-dot.active { background: var(--navy); }
.step-dot.done { background: var(--navy); opacity: 0.5; }
.step-label {
  text-align: center;
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 32px;
}

/* ── Cards ── */
.card {
  background: var(--white);
  border-radius: 12px;
  padding: 36px;
  margin-bottom: 24px;
  border: 1px solid var(--border);
}
.card-title {
  font-family: 'Gilda Display', serif;
  font-size: 28px;
  color: var(--navy);
  margin-bottom: 8px;
  font-weight: 400;
}
.card-subtitle {
  font-size: 15px;
  color: var(--text-light);
  margin-bottom: 28px;
}

/* ── Identity Form ── */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.form-group { display: flex; flex-direction: column; }
.form-group.full-width { grid-column: 1 / -1; }
.form-group label {
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 6px;
}
.form-group label .required { color: var(--red); }
.form-group input, .form-group select {
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 15px;
  font-family: 'Open Sans', sans-serif;
  color: var(--text);
  transition: border-color 0.2s;
  background: var(--white);
}
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--navy);
}
.form-group input.error, .form-group select.error {
  border-color: var(--red);
}

/* ── Questions ── */
.question-block {
  padding: 24px 0;
  border-bottom: 1px solid var(--border);
}
.question-block:last-of-type { border-bottom: none; }
.question-number {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.question-text {
  font-size: 16px;
  color: var(--navy);
  margin-bottom: 16px;
  font-weight: 600;
  line-height: 1.5;
}
.answer-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.answer-btn {
  padding: 12px 8px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--white);
  color: var(--text-light);
  font-size: 13px;
  font-family: 'Open Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  line-height: 1.3;
}
.answer-btn:hover {
  border-color: var(--navy);
  color: var(--navy);
}
.answer-btn.selected {
  border-color: var(--navy);
  background: var(--navy);
  color: var(--white);
  font-weight: 600;
}
.answer-btn .score-label {
  display: block;
  font-size: 11px;
  opacity: 0.7;
  margin-top: 2px;
}

/* ── Freitext ── */
.freitext-section {
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}
.freitext-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 8px;
}
.freitext-hint {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 10px;
}
.freitext-area {
  width: 100%;
  min-height: 80px;
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: 'Open Sans', sans-serif;
  color: var(--text);
  resize: vertical;
  transition: border-color 0.2s;
}
.freitext-area:focus {
  outline: none;
  border-color: var(--navy);
}

/* ── Navigation ── */
.nav-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 32px;
}
.btn {
  padding: 14px 32px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  font-family: 'Open Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
}
.btn-back {
  background: transparent;
  color: var(--text-light);
  border: 2px solid var(--border);
}
.btn-back:hover { border-color: var(--navy); color: var(--navy); }
.btn-back:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-next {
  background: var(--navy);
  color: var(--white);
}
.btn-next:hover { background: #1a3d5c; }
.btn-next:disabled {
  background: var(--soft-blue);
  color: var(--text-light);
  cursor: not-allowed;
}

/* ── Results ── */
.results-header {
  text-align: center;
  margin-bottom: 40px;
}
.results-header h1 {
  font-family: 'Gilda Display', serif;
  font-size: 36px;
  color: var(--navy);
  font-weight: 400;
  margin-bottom: 8px;
}
.results-score-big {
  font-family: 'Gilda Display', serif;
  font-size: 64px;
  font-weight: 400;
  margin: 16px 0 4px;
}
.results-score-label {
  font-size: 16px;
  color: var(--text-light);
}
.status-badge {
  display: inline-block;
  padding: 8px 24px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-top: 16px;
}
.dim-result-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
}
.dim-result-item:last-child { border-bottom: none; }
.dim-result-name {
  flex: 0 0 200px;
  font-size: 15px;
  font-weight: 600;
  color: var(--navy);
}
.dim-result-bar-bg {
  flex: 1;
  height: 10px;
  background: #eef1f5;
  border-radius: 5px;
  overflow: hidden;
}
.dim-result-bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.6s ease;
}
.dim-result-score {
  flex: 0 0 60px;
  text-align: right;
  font-size: 15px;
  font-weight: 700;
  color: var(--navy);
}
.dim-result-status {
  flex: 0 0 140px;
  text-align: right;
  font-size: 13px;
  font-weight: 600;
}

/* ── Submit Section ── */
.submit-section {
  text-align: center;
  padding: 40px 36px;
  background: var(--navy);
  border-radius: 12px;
  margin-top: 32px;
}
.submit-section h3 {
  font-family: 'Gilda Display', serif;
  font-size: 24px;
  color: var(--white);
  font-weight: 400;
  margin-bottom: 12px;
}
.submit-section p {
  font-size: 15px;
  color: var(--soft-blue);
  margin-bottom: 24px;
  line-height: 1.6;
}
.btn-submit {
  background: var(--yellow);
  color: var(--navy);
  padding: 16px 48px;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Open Sans', sans-serif;
  transition: all 0.2s;
}
.btn-submit:hover { background: #e5c830; }
.btn-submit:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ── Confirmation ── */
.confirmation {
  text-align: center;
  padding: 60px 20px;
}
.confirmation-icon {
  width: 80px;
  height: 80px;
  background: var(--navy);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  font-size: 36px;
}
.confirmation h2 {
  font-family: 'Gilda Display', serif;
  font-size: 32px;
  color: var(--navy);
  font-weight: 400;
  margin-bottom: 16px;
}
.confirmation p {
  font-size: 16px;
  color: var(--text-light);
  max-width: 500px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ── Responsive ── */
@media (max-width: 700px) {
  .card { padding: 24px 20px; }
  .form-grid { grid-template-columns: 1fr; }
  .answer-grid { grid-template-columns: repeat(2, 1fr); }
  .dim-result-item { flex-wrap: wrap; gap: 8px; }
  .dim-result-name { flex: 0 0 100%; }
  .dim-result-bar-bg { flex: 1; }
  .dim-result-status { flex: 0 0 auto; }
  .intro h1 { font-size: 28px; }
  .results-score-big { font-size: 48px; }
  .site-header { padding: 16px 20px; }
  .site-header .logo { font-size: 20px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">HiringLab</div>
  <div class="badge">Diagnose-Check</div>
</header>

<div class="container" id="app"></div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const MAKE_WEBHOOK_URL = "https://hook.eu2.make.com/s5ipivd2w8ve6cctk5714d6tynxg5jr2";

const ANSWER_LABELS = [
  { value: 1, short: "Nicht vorhanden", long: "Nicht vorhanden / kein klares Bewusstsein" },
  { value: 2, short: "Erste Ansätze", long: "Erste Ansätze vorhanden, aber nicht systematisch" },
  { value: 3, short: "Teilweise etabliert", long: "Vorhanden und teilweise gelebt" },
  { value: 4, short: "Systematisch verankert", long: "Systematisch, dokumentiert und kontinuierlich verbessert" }
];

const dimensions = [
  { title: "Prozessklarheit", questions: [
    "Unser Recruiting-Prozess ist dokumentiert UND wird von allen Beteiligten aktiv genutzt.",
    "Wenn jemand Neues ins Recruiting-Team kommt, kann diese Person innerhalb von 2 Wochen eigenständig arbeiten.",
    "Entscheidungen im Recruiting-Prozess werden innerhalb von 48 Stunden getroffen.",
    "Informationen fließen ohne manuelles Übertragen zwischen den Prozessschritten.",
    "Wir haben unseren Recruiting-Prozess in den letzten 12 Monaten mindestens einmal überarbeitet."
  ]},
  { title: "Digitalisierung & Tools", questions: [
    "Unser ATS/Recruiting-System ist die einzige Quelle der Wahrheit für alle Recruiting-Aktivitäten (keine Parallel-Excel, keine E-Mail-Schleifen).",
    "Wiederkehrende Aufgaben im Recruiting (z.\u202fB. Statusmails, Erinnerungen, Terminfindung) laufen automatisiert ab, nicht manuell.",
    "Kandidaten können sich über jedes Gerät in unter 5 Minuten bewerben.",
    "Unsere Recruiting-Tools sind miteinander verbunden. Daten fließen automatisch, ohne Copy-Paste zwischen Systemen.",
    "Wir haben in den letzten 12 Monaten mindestens eine Prozessverbesserung durch Digitalisierung umgesetzt."
  ]},
  { title: "Candidate Experience", questions: [
    "Bewerber erhalten innerhalb von 48 Stunden eine erste inhaltliche Rückmeldung (nicht nur Auto-Reply).",
    "Der Bewerbungsprozess dauert maximal 5 Minuten UND funktioniert auf dem Smartphone einwandfrei.",
    "Kandidaten wissen jederzeit, in welcher Phase sie sich befinden und was als Nächstes passiert.",
    "Wir messen systematisch die Candidate Experience (z.\u202fB. NPS, Feedback-Umfragen) UND leiten daraus Verbesserungen ab.",
    "Abgelehnte Kandidaten erhalten eine wertschätzende, individuelle Absage und nicht nur eine Standard-Mail."
  ]},
  { title: "Datenbasierte Steuerung", questions: [
    "Wir kennen unsere Time-to-Hire pro Rolle/Abteilung UND nutzen diese Daten aktiv zur Prozessoptimierung.",
    "Wir kennen die Kosten pro Einstellung (Cost-per-Hire) UND den ROI verschiedener Recruiting-Kanäle.",
    "Wir analysieren systematisch, an welchen Prozessschritten Kandidaten abspringen UND haben daraus Verbesserungen abgeleitet.",
    "Wir vergleichen unsere Recruiting-KPIs mit Branchen-Benchmarks oder internen Zielvorgaben.",
    "Recruiting-Kennzahlen werden monatlich an Geschäftsführung/Management reportet UND fließen in strategische Entscheidungen ein."
  ]},
  { title: "Team & Kompetenzen", questions: [
    "Recruiting ist eine dedizierte Vollzeit-Verantwortung, nicht nur 'nebenbei'.",
    "Hiring Manager führen strukturierte Interviews anhand klarer Bewertungskriterien.",
    "HR und Fachabteilungen stimmen sich mindestens wöchentlich zu offenen Positionen ab.",
    "Unser Recruiting-Team hat neben dem Tagesgeschäft ausreichend Kapazität für strategische Themen wie Sourcing oder Prozessverbesserung.",
    "Wir testen regelmäßig neue Recruiting-Ansätze (z.\u202fB. neue Kanäle, KI-Tools, Prozess-Experimente) und evaluieren deren Erfolg."
  ]},
  { title: "Kulturelle Verankerung", questions: [
    "Recruiting ist regelmäßiger Tagesordnungspunkt in Geschäftsführungs-/Management-Meetings.",
    "Die Geschäftsführung ist persönlich bei Key-Hires involviert (z.\u202fB. Finalist-Gespräche, strategische Positionen).",
    "Führungskräfte sehen Recruiting als gemeinsame Verantwortung, nicht als reine HR-Aufgabe.",
    "Mitarbeitende teilen aktiv offene Stellen in ihren Netzwerken UND werden dafür systematisch aktiviert.",
    "Employer Branding hat ein dediziertes Budget UND messbare Ziele."
  ]}
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let currentStep = 0; // 0 = identity, 1-6 = dimensions, 7 = results
let answers = {};
let freitexte = {};
let identity = { name: '', firma: '', email: '', rolle: '', teamgroesse: '' };
let submitted = false;

// ══════════════════════════════════════════
// SCORING
// ══════════════════════════════════════════
function getDimensionScore(dimIndex) {
  let score = 0;
  dimensions[dimIndex].questions.forEach((_, qIdx) => {
    score += answers[`${dimIndex}-${qIdx}`] || 0;
  });
  return score;
}

function getTotalScore() {
  return Object.values(answers).reduce((sum, val) => sum + val, 0);
}

function getDimensionStatus(score) {
  const avg = score / 5;
  if (avg < 2) return { label: 'Kritisch', color: 'var(--red)' };
  if (avg < 3) return { label: 'Entwicklungsbedarf', color: '#d4940a' };
  if (avg < 3.6) return { label: 'Optimierungspotenzial', color: '#2a7d5f' };
  return { label: 'Stark', color: 'var(--navy)' };
}

function getOverallStatus(total) {
  if (total <= 54) return { label: 'KRITISCH', color: 'var(--red)', desc: 'Ihr Recruiting-System hat in mehreren Dimensionen grundlegenden Handlungsbedarf. Im Workshop identifizieren wir gemeinsam die wirksamsten Hebel.' };
  if (total <= 84) return { label: 'ENTWICKLUNGSBEDARF', color: '#d4940a', desc: 'Ihr Recruiting-System funktioniert im Alltag, hat aber strukturelle Schwachstellen. Im Workshop machen wir diese sichtbar und priorisieren.' };
  if (total <= 104) return { label: 'OPTIMIERUNGSPOTENZIAL', color: '#2a7d5f', desc: 'Ihr Recruiting-System ist solide aufgestellt. Im Workshop identifizieren wir gezielt die Bereiche mit dem größten Hebel für den nächsten Schritt.' };
  return { label: 'STARK', color: 'var(--navy)', desc: 'Ihr Recruiting-System ist professionell aufgestellt. Im Workshop schauen wir, wo Sie von Gut zu Exzellent kommen.' };
}

function isCurrentStepComplete() {
  if (currentStep === 0) {
    return identity.name.trim() && identity.firma.trim() && identity.email.trim() && identity.rolle.trim() && identity.teamgroesse.trim() && isValidEmail(identity.email);
  }
  const dimIndex = currentStep - 1;
  return dimensions[dimIndex].questions.every((_, idx) => answers[`${dimIndex}-${idx}`] !== undefined);
}

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email || '').trim());
}

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function goNext() {
  if (!isCurrentStepComplete()) return;
  if (currentStep === 0) saveIdentityFromForm();
  if (currentStep < 6) saveFreitext();
  currentStep++;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function goBack() {
  if (currentStep === 0) return;
  if (currentStep <= 6) saveFreitext();
  currentStep--;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function saveIdentityFromForm() {
  identity.name = document.getElementById('field-name')?.value || '';
  identity.firma = document.getElementById('field-firma')?.value || '';
  identity.email = document.getElementById('field-email')?.value || '';
  identity.rolle = document.getElementById('field-rolle')?.value || '';
  identity.teamgroesse = document.getElementById('field-teamgroesse')?.value || '';
}

function saveFreitext() {
  if (currentStep >= 1 && currentStep <= 6) {
    const dimIndex = currentStep - 1;
    const el = document.getElementById(`freitext-${dimIndex}`);
    if (el) freitexte[dimIndex] = el.value;
  }
}

function handleAnswer(dimIndex, qIndex, value) {
  answers[`${dimIndex}-${qIndex}`] = value;
  render();
}

function checkIdentityFields() {
  const btn = document.querySelector('.btn-next');
  if (btn) btn.disabled = !isCurrentStepComplete();
}

// ══════════════════════════════════════════
// RENDER: IDENTITY STEP
// ══════════════════════════════════════════
function renderIdentity() {
  return `
    <div class="intro">
      <h1>Diagnose-Check</h1>
      <p>Ihre Antworten dienen der Vorbereitung unseres Diagnose-Workshops. Bitte beantworten Sie alle Fragen ehrlich. Es gibt kein Richtig oder Falsch.</p>
    </div>
    ${renderStepIndicator()}
    <div class="card">
      <div class="card-title">Bevor es losgeht</div>
      <div class="card-subtitle">Bitte tragen Sie Ihre Daten ein, damit wir die Ergebnisse zuordnen können.</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Ihr Name <span class="required">*</span></label>
          <input type="text" id="field-name" value="${escHtml(identity.name)}" oninput="identity.name=this.value; checkIdentityFields()" placeholder="Vor- und Nachname">
        </div>
        <div class="form-group">
          <label>Unternehmen <span class="required">*</span></label>
          <input type="text" id="field-firma" value="${escHtml(identity.firma)}" oninput="identity.firma=this.value; checkIdentityFields()" placeholder="Firmenname">
        </div>
        <div class="form-group">
          <label>E-Mail-Adresse <span class="required">*</span></label>
          <input type="email" id="field-email" value="${escHtml(identity.email)}" oninput="identity.email=this.value; checkIdentityFields()" placeholder="ihre.email@firma.de">
        </div>
        <div class="form-group">
          <label>Ihre Rolle/Position <span class="required">*</span></label>
          <input type="text" id="field-rolle" value="${escHtml(identity.rolle)}" oninput="identity.rolle=this.value; checkIdentityFields()" placeholder="z. B. HR-Leitung, Personalreferent">
        </div>
        <div class="form-group full-width">
          <label>Teamgröße im Recruiting <span class="required">*</span></label>
          <select id="field-teamgroesse" onchange="identity.teamgroesse=this.value; checkIdentityFields()">
            <option value="">Bitte wählen</option>
            <option value="1 Person (Recruiting ist nebenbei)" ${identity.teamgroesse === '1 Person (Recruiting ist nebenbei)' ? 'selected' : ''}>1 Person (Recruiting ist nebenbei)</option>
            <option value="1-2 Personen dediziert" ${identity.teamgroesse === '1-2 Personen dediziert' ? 'selected' : ''}>1–2 Personen dediziert</option>
            <option value="3-5 Personen" ${identity.teamgroesse === '3-5 Personen' ? 'selected' : ''}>3–5 Personen</option>
            <option value="6+ Personen" ${identity.teamgroesse === '6+ Personen' ? 'selected' : ''}>6+ Personen</option>
          </select>
        </div>
      </div>
    </div>
    <div class="nav-bar">
      <div></div>
      <button class="btn btn-next" onclick="goNext()" ${!isCurrentStepComplete() ? 'disabled' : ''}>Weiter →</button>
    </div>
  `;
}

// ══════════════════════════════════════════
// RENDER: DIMENSION STEP
// ══════════════════════════════════════════
function renderDimension() {
  const dimIndex = currentStep - 1;
  const dim = dimensions[dimIndex];
  const isComplete = isCurrentStepComplete();
  const isLast = currentStep === 6;

  return `
    ${renderStepIndicator()}
    <div class="card">
      <div class="card-title">${dim.title}</div>
      <div class="card-subtitle">Bewerten Sie jede Aussage auf einer Skala von 1 bis 4. Wie trifft sie auf Ihr Unternehmen zu?</div>
      ${dim.questions.map((q, qIdx) => {
        const key = `${dimIndex}-${qIdx}`;
        const selected = answers[key];
        return `
          <div class="question-block">
            <div class="question-number">Frage ${qIdx + 1} von ${dim.questions.length}</div>
            <div class="question-text">${q}</div>
            <div class="answer-grid">
              ${ANSWER_LABELS.map(a => `
                <button class="answer-btn ${selected === a.value ? 'selected' : ''}" onclick="handleAnswer(${dimIndex}, ${qIdx}, ${a.value})" title="${a.long}">
                  ${a.short}
                  <span class="score-label">${a.value}/4</span>
                </button>
              `).join('')}
            </div>
          </div>
        `;
      }).join('')}
      <div class="freitext-section">
        <div class="freitext-label">Erste Beobachtung (optional)</div>
        <div class="freitext-hint">Was fällt Ihnen zu dieser Dimension spontan auf? Gibt es etwas, das Sie im Workshop besprechen möchten?</div>
        <textarea class="freitext-area" id="freitext-${dimIndex}" placeholder="Ihre Notizen …">${escHtml(freitexte[dimIndex] || '')}</textarea>
      </div>
    </div>
    <div class="nav-bar">
      <button class="btn btn-back" onclick="goBack()">← Zurück</button>
      <button class="btn btn-next" onclick="goNext()" ${!isComplete ? 'disabled' : ''}>${isLast ? 'Ergebnis anzeigen →' : 'Weiter →'}</button>
    </div>
  `;
}

// ══════════════════════════════════════════
// RENDER: RESULTS
// ══════════════════════════════════════════
function renderResults() {
  if (submitted) return renderConfirmation();

  const total = getTotalScore();
  const overall = getOverallStatus(total);
  const percentage = ((total - 30) / 90) * 100; // normalize: 30=0%, 120=100%

  return `
    <div class="results-header">
      <h1>Ihre Standortbestimmung</h1>
      <div class="results-score-big" style="color: ${overall.color}">${total} / 120</div>
      <div class="results-score-label">Gesamtpunktzahl</div>
      <div class="status-badge" style="background: ${overall.color}; color: white;">${overall.label}</div>
      <p style="margin-top: 20px; font-size: 15px; color: var(--text-light); max-width: 560px; margin-left: auto; margin-right: auto; line-height: 1.7;">${overall.desc}</p>
    </div>

    <div class="card">
      <div class="card-title">Ergebnis nach Dimensionen</div>
      <div class="card-subtitle">Ihre Bewertung auf einen Blick. Die Detailanalyse besprechen wir im Workshop.</div>
      ${dimensions.map((dim, idx) => {
        const score = getDimensionScore(idx);
        const status = getDimensionStatus(score);
        const pct = ((score - 5) / 15) * 100;
        return `
          <div class="dim-result-item">
            <div class="dim-result-name">${dim.title}</div>
            <div class="dim-result-bar-bg">
              <div class="dim-result-bar-fill" style="width: ${Math.max(pct, 3)}%; background: ${status.color};"></div>
            </div>
            <div class="dim-result-score">${score}/20</div>
            <div class="dim-result-status" style="color: ${status.color}">${status.label}</div>
          </div>
        `;
      }).join('')}
    </div>

    <div class="submit-section">
      <h3>Ergebnisse zur Workshop-Vorbereitung absenden</h3>
      <p>Ihre Antworten und Ergebnisse werden an Audina Kamboua übermittelt. Auf dieser Basis bereiten wir Ihren individuellen Diagnose-Workshop vor.</p>
      <button class="btn-submit" onclick="submitToWebhook()" id="submitBtn">Absenden zur Workshop-Vorbereitung →</button>
    </div>

    <div class="nav-bar">
      <button class="btn btn-back" onclick="currentStep=6; render();">← Zurück zu den Fragen</button>
      <div></div>
    </div>
  `;
}

// ══════════════════════════════════════════
// RENDER: CONFIRMATION
// ══════════════════════════════════════════
function renderConfirmation() {
  return `
    <div class="confirmation">
      <div class="confirmation-icon">
        <span style="color: var(--yellow);">✓</span>
      </div>
      <h2>Vielen Dank!</h2>
      <p>Ihre Antworten wurden erfolgreich übermittelt. Audina wird auf Basis Ihrer Ergebnisse den Diagnose-Workshop vorbereiten.</p>
      <p style="margin-top: 20px; font-size: 14px; color: var(--text-light);">Sie können dieses Fenster jetzt schließen.</p>
    </div>
  `;
}

// ══════════════════════════════════════════
// STEP INDICATOR
// ══════════════════════════════════════════
function renderStepIndicator() {
  const totalSteps = 8; // identity + 6 dims + results
  const labels = ['Angaben', 'Prozessklarheit', 'Digitalisierung', 'Candidate Exp.', 'Daten', 'Team', 'Kultur', 'Ergebnis'];
  return `
    <div class="step-indicator">
      ${Array.from({length: totalSteps}).map((_, i) => {
        let cls = '';
        if (i < currentStep) cls = 'done';
        else if (i === currentStep) cls = 'active';
        return `<div class="step-dot ${cls}"></div>`;
      }).join('')}
    </div>
    <div class="step-label">Schritt ${currentStep + 1} von ${totalSteps}: ${labels[currentStep]}</div>
  `;
}

// ══════════════════════════════════════════
// SUBMIT
// ══════════════════════════════════════════
function submitToWebhook() {
  const btn = document.getElementById('submitBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Wird gesendet …'; }

  // Save last freitext if on results page coming from dim 6
  const total = getTotalScore();
  const overall = getOverallStatus(total);

  const payload = {
    timestamp: new Date().toISOString(),
    typ: "diagnose-check",
    identity: { ...identity },
    ergebnis: {
      total: total,
      max: 120,
      status: overall.label
    },
    dimensionen: {},
    antworten: {},
    beobachtungen: {}
  };

  dimensions.forEach((dim, dimIdx) => {
    const score = getDimensionScore(dimIdx);
    const status = getDimensionStatus(score);
    payload.dimensionen[dim.title] = {
      score: score,
      max: 20,
      status: status.label
    };

    dim.questions.forEach((question, qIdx) => {
      const key = `${dimIdx}-${qIdx}`;
      const value = answers[key];
      const label = ANSWER_LABELS.find(a => a.value === value);
      payload.antworten[`${dim.title} – F${qIdx + 1}`] = {
        frage: question,
        wert: value,
        label: label ? label.short : ''
      };
    });

    if (freitexte[dimIdx]) {
      payload.beobachtungen[dim.title] = freitexte[dimIdx];
    }
  });

  if (MAKE_WEBHOOK_URL && MAKE_WEBHOOK_URL !== "DEINE_MAKE_WEBHOOK_URL_HIER") {
    fetch(MAKE_WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(() => { submitted = true; render(); })
    .catch(() => {
      submitted = true;
      render();
    });
  } else {
    // Fallback: log to console if no webhook configured
    console.log("Diagnose-Check Payload:", JSON.stringify(payload, null, 2));
    submitted = true;
    render();
  }
}

// ══════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// ══════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  if (currentStep === 0) {
    app.innerHTML = renderIdentity();
  } else if (currentStep >= 1 && currentStep <= 6) {
    app.innerHTML = renderDimension();
  } else {
    app.innerHTML = renderResults();
  }
}

render();
</script>
</body>
</html>
