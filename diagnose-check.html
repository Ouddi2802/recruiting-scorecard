* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #142f48;
  --soft-blue: #cfdae6;
  --beige: #f6f2e7;
  --red: #c74f62;
  --yellow: #feda37;
  --white: #ffffff;
  --text: #142f48;
  --text-light: #5a6d7e;
  --border: #dde4eb;
}
body {
  font-family: 'Open Sans', sans-serif;
  background: var(--beige);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* -- Header -- */
.site-header {
  background: var(--navy);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.site-header .logo img {
  height: 28px;
  width: auto;
  display: block;
}
.site-header .badge {
  font-size: 13px;
  color: var(--soft-blue);
  background: rgba(207,218,230,0.15);
  padding: 6px 14px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}

/* -- Container -- */
.container {
  max-width: 820px;
  margin: 0 auto;
  padding: 40px 20px 60px;
}

/* -- Intro Section -- */
.intro {
  text-align: center;
  margin-bottom: 48px;
}
.intro h1 {
  font-family: 'Gilda Display', serif;
  font-size: 36px;
  color: var(--navy);
  margin-bottom: 12px;
  font-weight: 400;
}
.intro p {
  font-size: 17px;
  color: var(--text-light);
  max-width: 600px;
  margin: 0 auto;
  line-height: 1.7;
}

/* -- Step Indicator -- */
.step-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin-bottom: 12px;
}
.step-dot {
  width: 32px;
  height: 4px;
  border-radius: 2px;
  background: var(--soft-blue);
  transition: background 0.3s;
}
.step-dot.active { background: var(--navy); }
.step-dot.done { background: var(--navy); opacity: 0.5; }
.step-label {
  text-align: center;
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 32px;
}

/* -- Cards -- */
.card {
  background: var(--white);
  border-radius: 12px;
  padding: 36px;
  margin-bottom: 24px;
  border: 1px solid var(--border);
}
.card-title {
  font-family: 'Gilda Display', serif;
  font-size: 28px;
  color: var(--navy);
  margin-bottom: 8px;
  font-weight: 400;
}
.card-subtitle {
  font-size: 15px;
  color: var(--text-light);
  margin-bottom: 28px;
}

/* -- Identity Form -- */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.form-group { display: flex; flex-direction: column; }
.form-group.full-width { grid-column: 1 / -1; }
.form-group label {
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 6px;
}
.form-group label .required { color: var(--red); }
.form-group input, .form-group select {
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 15px;
  font-family: 'Open Sans', sans-serif;
  color: var(--text);
  transition: border-color 0.2s;
  background: var(--white);
}
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--navy);
}
.form-group input.error, .form-group select.error {
  border-color: var(--red);
}

/* -- Questions -- */
.question-block {
  padding: 24px 0;
  border-bottom: 1px solid var(--border);
}
.question-block:last-of-type { border-bottom: none; }
.question-number {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.question-text {
  font-size: 16px;
  color: var(--navy);
  margin-bottom: 16px;
  font-weight: 600;
  line-height: 1.5;
}

/* -- Answer options (vertical radio style) -- */
.answer-stack {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.answer-option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--white);
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1.5;
}
.answer-option:hover {
  border-color: var(--navy);
}
.answer-option.selected {
  border-color: var(--navy);
  background: var(--navy);
  color: var(--white);
}
.answer-option .radio-circle {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  transition: all 0.2s;
}
.answer-option.selected .radio-circle {
  border-color: var(--yellow);
  background: var(--yellow);
}
.answer-option .radio-inner {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: transparent;
  transition: all 0.2s;
}
.answer-option.selected .radio-inner {
  background: var(--navy);
}
.answer-option .answer-content {
  flex: 1;
}
.answer-option .answer-level {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
  opacity: 0.7;
}
.answer-option.selected .answer-level {
  color: var(--yellow);
  opacity: 1;
}
.answer-option .answer-desc {
  font-size: 14px;
}

/* -- Freitext -- */
.freitext-section {
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}
.freitext-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 8px;
}
.freitext-hint {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 10px;
}
.freitext-area {
  width: 100%;
  min-height: 80px;
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: 'Open Sans', sans-serif;
  color: var(--text);
  resize: vertical;
  transition: border-color 0.2s;
}
.freitext-area:focus {
  outline: none;
  border-color: var(--navy);
}

/* -- Checklists -- */
.checklist-panel {
  background: var(--white);
  border-radius: 12px;
  padding: 28px 32px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}
.checklist-panel-title {
  font-family: 'Gilda Display', serif;
  font-size: 20px;
  color: var(--navy);
  margin-bottom: 4px;
  font-weight: 400;
}
.checklist-panel-hint {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 16px;
  font-style: italic;
}
.checklist-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.checklist-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.checklist-item:hover { background: var(--beige); }
.checklist-item input[type="checkbox"] {
  width: 18px;
  height: 18px;
  margin-top: 2px;
  accent-color: var(--navy);
  flex-shrink: 0;
  cursor: pointer;
}
.checklist-item label {
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  line-height: 1.4;
}

/* -- Navigation -- */
.nav-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 32px;
}
.btn {
  padding: 14px 32px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  font-family: 'Open Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
}
.btn-back {
  background: transparent;
  color: var(--text-light);
  border: 2px solid var(--border);
}
.btn-back:hover { border-color: var(--navy); color: var(--navy); }
.btn-back:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-next {
  background: var(--navy);
  color: var(--white);
}
.btn-next:hover { background: #1a3d5c; }
.btn-next:disabled {
  background: var(--soft-blue);
  color: var(--text-light);
  cursor: not-allowed;
}

/* -- Results -- */
.results-header {
  text-align: center;
  margin-bottom: 40px;
}
.results-header h1 {
  font-family: 'Gilda Display', serif;
  font-size: 36px;
  color: var(--navy);
  font-weight: 400;
  margin-bottom: 8px;
}
.results-score-big {
  font-family: 'Gilda Display', serif;
  font-size: 64px;
  font-weight: 400;
  margin: 16px 0 4px;
}
.results-score-label {
  font-size: 16px;
  color: var(--text-light);
}
.status-badge {
  display: inline-block;
  padding: 8px 24px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-top: 16px;
}
.dim-result-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
}
.dim-result-item:last-child { border-bottom: none; }
.dim-result-name {
  flex: 0 0 200px;
  font-size: 15px;
  font-weight: 600;
  color: var(--navy);
}
.dim-result-bar-bg {
  flex: 1;
  height: 10px;
  background: #eef1f5;
  border-radius: 5px;
  overflow: hidden;
}
.dim-result-bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.6s ease;
}
.dim-result-score {
  flex: 0 0 60px;
  text-align: right;
  font-size: 15px;
  font-weight: 700;
  color: var(--navy);
}
.dim-result-status {
  flex: 0 0 140px;
  text-align: right;
  font-size: 13px;
  font-weight: 600;
}

/* -- Checklist Results -- */
.checklist-result-panel {
  margin-top: 16px;
  padding: 16px 0;
  border-top: 1px solid var(--border);
}
.checklist-result-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 8px;
}
.checklist-result-items {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.checklist-result-tag {
  display: inline-block;
  padding: 4px 12px;
  background: var(--beige);
  border-radius: 4px;
  font-size: 13px;
  color: var(--text);
}
.checklist-result-none {
  font-size: 13px;
  color: var(--text-light);
  font-style: italic;
}

/* -- Submit Section -- */
.submit-section {
  text-align: center;
  padding: 40px 36px;
  background: var(--navy);
  border-radius: 12px;
  margin-top: 32px;
}
.submit-section h3 {
  font-family: 'Gilda Display', serif;
  font-size: 24px;
  color: var(--white);
  font-weight: 400;
  margin-bottom: 12px;
}
.submit-section p {
  font-size: 15px;
  color: var(--soft-blue);
  margin-bottom: 24px;
  line-height: 1.6;
}
.btn-submit {
  background: var(--yellow);
  color: var(--navy);
  padding: 16px 48px;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Open Sans', sans-serif;
  transition: all 0.2s;
}
.btn-submit:hover { background: #e5c830; }
.btn-submit:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* -- Confirmation -- */
.confirmation {
  text-align: center;
  padding: 60px 20px;
}
.confirmation-icon {
  width: 80px;
  height: 80px;
  background: var(--navy);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  font-size: 36px;
}
.confirmation h2 {
  font-family: 'Gilda Display', serif;
  font-size: 32px;
  color: var(--navy);
  font-weight: 400;
  margin-bottom: 16px;
}
.confirmation p {
  font-size: 16px;
  color: var(--text-light);
  max-width: 500px;
  margin: 0 auto;
  line-height: 1.7;
}

/* -- Responsive -- */
@media (max-width: 700px) {
  .card { padding: 24px 20px; }
  .form-grid { grid-template-columns: 1fr; }
  .checklist-grid { grid-template-columns: 1fr; }
  .dim-result-item { flex-wrap: wrap; gap: 8px; }
  .dim-result-name { flex: 0 0 100%; }
  .dim-result-bar-bg { flex: 1; }
  .dim-result-status { flex: 0 0 auto; }
  .intro h1 { font-size: 28px; }
  .results-score-big { font-size: 48px; }
  .site-header { padding: 16px 20px; }
  .site-header .logo { font-size: 20px; }
  .checklist-panel { padding: 20px 16px; }
}
</style>

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function getDimensionScore(dimIndex) {
  const dim = dimensions[dimIndex];
  let score = 0;
  dim.questions.forEach((q, qi) => {
    const key = `d${dimIndex}_q${qi}`;
    score += (answers[key] || 0);
  });
  return score;
}

function getDimensionPercent(dimIndex) {
  const score = getDimensionScore(dimIndex);
  const max = dimensions[dimIndex].questions.length * 5;
  return Math.round((score / max) * 100);
}

function getGesamtPercent() {
  let sum = 0;
  for (let i = 0; i < dimensions.length; i++) {
    sum += getDimensionPercent(i);
  }
  return Math.round(sum / dimensions.length);
}

function getStatusFromPercent(pct) {
  if (pct <= 30) return { label: 'Grundlagen schaffen', color: 'var(--red)' };
  if (pct <= 55) return { label: 'Entwicklungsbedarf', color: '#d4940a' };
  if (pct <= 75) return { label: 'Aufbauphase', color: '#b8860b' };
  if (pct <= 90) return { label: 'Stabil aufgestellt', color: '#2a7d5f' };
  return { label: 'Strategisch gesteuert', color: 'var(--navy)' };
}

  const dim = dimensions[dimIndex];
  for (let qi = 0; qi < dim.questions.length; qi++) {
    if (!answers[`d${dimIndex}_q${qi}`]) return false;
  }
  return true;
}

function identityValid() {
  return identity.name.trim() && identity.unternehmen.trim() && identity.email.trim() && identity.rolle.trim() && identity.teamgroesse && identity.stellen_pro_jahr && identity.organisation;
}

// ====================================================
// RENDER
// ====================================================
function render() {
  const app = document.getElementById('app');
  if (currentStep === 0) renderIdentity(app);
  else if (currentStep >= 1 && currentStep <= 7) renderDimension(app, currentStep - 1);
  else if (currentStep === 8) renderChecklists(app);
  else if (currentStep === 9) renderResults(app);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderStepIndicator(activeStep) {
  let html = '<div class="step-indicator">';
  for (let i = 0; i < 10; i++) {
    let cls = 'step-dot';
    if (i === activeStep) cls += ' active';
    else if (i < activeStep) cls += ' done';
    html += `<div class="${cls}"></div>`;
  }
  html += '</div>';
  html += `<div class="step-label">${escHtml(stepLabels[activeStep])}</div>`;
  return html;
}

function renderIdentity(app) {
  let html = '';
  html += '<div class="intro">';
  html += '<h1>Recruiting-Reifegradanalyse</h1>';
  html += '<p>Diese Standortbestimmung bildet die Grundlage für Ihren Diagnose-Workshop. Ihre Antworten helfen uns, den Workshop gezielt vorzubereiten und direkt an den relevanten Stellen anzusetzen. Es geht nicht um richtig oder falsch, sondern um einen ehrlichen Blick auf den aktuellen Stand Ihres Recruitings.</p>';
  html += '</div>';
  html += renderStepIndicator(0);
  html += '<div class="card">';
  html += '<div class="card-title">Ihre Angaben</div>';
  html += '<div class="card-subtitle">Bitte tragen Sie Ihre Daten ein, damit wir Ihre Ergebnisse korrekt zuordnen und im Workshop einordnen können.</div>';
  html += '<div class="form-grid">';
  html += `<div class="form-group"><label>Ihr Name <span class="required">*</span></label><input type="text" id="f-name" placeholder="Vor- und Nachname" value="${escHtml(identity.name)}"></div>`;
  html += `<div class="form-group"><label>Unternehmen <span class="required">*</span></label><input type="text" id="f-unternehmen" placeholder="Firmenname" value="${escHtml(identity.unternehmen)}"></div>`;
  html += `<div class="form-group"><label>E-Mail-Adresse <span class="required">*</span></label><input type="email" id="f-email" placeholder="ihre.email@firma.de" value="${escHtml(identity.email)}"></div>`;

  html += `<div class="form-group"><label>Anzahl zu besetzender Stellen pro Jahr <span class="required">*</span></label><select id="f-stellen"><option value="">Bitte wählen</option><option value="1–10"${identity.stellen_pro_jahr==='1–10'?' selected':''}>1–10</option><option value="11–25"${identity.stellen_pro_jahr==='11–25'?' selected':''}>11–25</option><option value="26–50"${identity.stellen_pro_jahr==='26–50'?' selected':''}>26–50</option><option value="51–100"${identity.stellen_pro_jahr==='51–100'?' selected':''}>51–100</option><option value="101–250"${identity.stellen_pro_jahr==='101–250'?' selected':''}>101–250</option><option value="250+"${identity.stellen_pro_jahr==='250+'?' selected':''}>250+</option></select></div>`;
  html += `<div class="form-group full-width"><label>Wie ist Recruiting organisiert? <span class="required">*</span></label><select id="f-organisation"><option value="">Bitte wählen</option><option value="Zentral"${identity.organisation==='Zentral'?' selected':''}>Zentral</option><option value="Dezentral (in den Fachbereichen)"${identity.organisation==='Dezentral (in den Fachbereichen)'?' selected':''}>Dezentral (in den Fachbereichen)</option><option value="Hybridmodell"${identity.organisation==='Hybridmodell'?' selected':''}>Hybridmodell</option><option value="Kein definiertes Modell"${identity.organisation==='Kein definiertes Modell'?' selected':''}>Kein definiertes Modell</option></select></div>`;

function renderDimension(app, dimIndex) {
  const dim = dimensions[dimIndex];
  const levelLabels = ['Stufe 1', 'Stufe 2', 'Stufe 3', 'Stufe 4', 'Stufe 5'];
  let html = '';
  html += renderStepIndicator(dimIndex + 1);
  html += '<div class="card">';
  html += `<div class="card-title">${escHtml(dim.title)}</div>`;
  html += '<div class="card-subtitle">Wählen Sie für jede Frage die Beschreibung, die am besten auf Ihre aktuelle Situation zutrifft.</div>';

  dim.questions.forEach((q, qi) => {
    const key = `d${dimIndex}_q${qi}`;
    html += '<div class="question-block">';
    html += `<div class="question-number">Frage ${qi + 1} von ${dim.questions.length}</div>`;
    html += `<div class="question-text">${escHtml(q.text)}</div>`;
    html += '<div class="answer-stack">';
    q.levels.forEach((lvl, li) => {
      const val = li + 1;
      const sel = answers[key] === val ? ' selected' : '';
      html += `<div class="answer-option${sel}" onclick="selectAnswer('${key}', ${val})">`;
      html += '<div class="radio-circle"><div class="radio-inner"></div></div>';
      html += '<div class="answer-content">';
      html += `<div class="answer-level">${escHtml(levelLabels[li])}</div>`;
      html += `<div class="answer-desc">${escHtml(lvl)}</div>`;
      html += '</div></div>';
    });
    html += '</div></div>';
  });

  // Freitext
  const ftVal = freitexte[dim.title] || '';
  html += '<div class="freitext-section">';
  html += '<div class="freitext-label">Beobachtung (optional)</div>';
  html += '<div class="freitext-hint">Was fällt Ihnen zu dieser Dimension spontan auf? Gibt es Punkte, die wir im Workshop genauer betrachten sollten?</div>';
  html += `<textarea class="freitext-area" id="freitext-dim" placeholder="">${escHtml(ftVal)}</textarea>`;
  html += '</div>';

  html += '</div>';
  html += `<div class="nav-bar"><button class="btn btn-back" onclick="prevStep()">← Zurück</button><button class="btn btn-next" onclick="nextStep()">Weiter</button></div>`;
  app.innerHTML = html;
}

function renderChecklists(app) {
  let html = '';
  html += renderStepIndicator(8);
  html += '<div class="intro" style="margin-bottom:32px;">';
  html += '<h1>Praxischeck</h1>';
  html += '<p>Die folgenden Angaben fließen nicht in den Score ein. Sie dienen der gezielten Vorbereitung Ihres Diagnose-Workshops.</p>';
  html += '</div>';

  checklists.forEach((cl, ci) => {
    html += '<div class="checklist-panel">';
    html += `<div class="checklist-panel-title">${escHtml(cl.title)}</div>`;
    html += '<div class="checklist-panel-hint">Diese Angabe fließt nicht in den Score ein. Sie hilft uns bei der gezielten Workshop-Vorbereitung.</div>';
    html += '<div class="checklist-grid">';
    cl.items.forEach((item, ii) => {
      const checked = checklistAnswers[cl.key].includes(item) ? ' checked' : '';
      const id = `cl_${ci}_${ii}`;
      html += `<div class="checklist-item" onclick="toggleChecklist('${cl.key}', '${escHtml(item).replace(/'/g, "\\'")}', this)">`;
      html += `<input type="checkbox" id="${id}"${checked} style="pointer-events:none">`;
      html += `<label>${escHtml(item)}</label>`;
      html += '</div>';
    });
    html += '</div>';

    // Sub-question
    if (cl.subQuestion) {
      html += '<div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border);">';
      if (cl.subQuestion.type === 'text') {
        html += `<div class="freitext-label">${escHtml(cl.subQuestion.label)}</div>`;
        html += `<input type="text" class="freitext-area" style="min-height:auto; padding:12px 14px;" id="sub-${cl.subQuestion.key}" value="${escHtml(subQuestions[cl.subQuestion.key])}" placeholder="">`;
      } else if (cl.subQuestion.type === 'radio') {
        html += `<div class="freitext-label">${escHtml(cl.subQuestion.label)}</div>`;
        html += '<div style="display:flex; flex-direction:column; gap:8px; margin-top:8px;">';
        cl.subQuestion.options.forEach((opt, oi) => {
          const checked = subQuestions[cl.subQuestion.key] === opt ? ' checked' : '';
          html += `<label style="display:flex; align-items:center; gap:8px; font-size:14px; cursor:pointer;"><input type="radio" name="sub-${cl.subQuestion.key}" value="${escHtml(opt)}"${checked} onchange="setSubQuestion('${cl.subQuestion.key}', '${escHtml(opt).replace(/'/g, "\\'")}')" style="accent-color:var(--navy);"> ${escHtml(opt)}</label>`;

      }
      html += '</div>';
    }

    html += '</div>';
  });

  html += `<div class="nav-bar"><button class="btn btn-back" onclick="prevStep()">← Zurück</button><button class="btn btn-next" onclick="nextStep()">Ergebnis anzeigen</button></div>`;
  app.innerHTML = html;
}

function renderResults(app) {
  const gesamtPct = getGesamtPercent();
  const status = getStatusFromPercent(gesamtPct);
  const deutung = getDeutungstext(status.label);

  // Compute dimension data
  const dimData = dimensions.map((d, i) => ({
    shortTitle: d.shortTitle,
    title: d.title,
    percent: getDimensionPercent(i),
    status: getStatusFromPercent(getDimensionPercent(i))
  }));

  // Weakest 3
  const sorted = [...dimData].sort((a, b) => a.percent - b.percent);
  const weakest3 = sorted.slice(0, 3);
  const strongest = sorted[sorted.length - 1];

  let html = '';
  html += renderStepIndicator(9);
  html += '<div class="results-header">';
  html += '<h1>Ihre Standortbestimmung</h1>';
  html += `<div class="results-score-big" style="color:${status.color}">${gesamtPct} %</div>`;
  html += '<div class="results-score-label">Recruiting-Reifegrad</div>';
  html += `<div class="status-badge" style="background:${status.color}; color:var(--white);">${escHtml(status.label)}</div>`;
  html += `<p style="margin-top:16px; font-size:15px; color:var(--text-light); max-width:600px; margin-left:auto; margin-right:auto;">${escHtml(deutung)}</p>`;
  html += '</div>';

  // Disclaimer
  html += '<p style="text-align:center; font-size:13px; color:var(--text-light); margin-bottom:32px; font-style:italic;">Diese Auswertung ist eine erste Standortbestimmung. Die Ursachen und Prioritäten werden im Workshop gemeinsam vertieft.</p>';

  // Workshop relevance
  html += '<div class="card" style="margin-bottom:24px;">';
  html += '<div style="margin-bottom:16px;"><strong style="color:var(--navy);">Für den Workshop besonders relevant:</strong></div>';
  html += '<div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;">';
  weakest3.forEach(d => {
    html += `<span style="display:inline-block; padding:6px 14px; background:var(--red); color:var(--white); border-radius:6px; font-size:13px; font-weight:600;">${escHtml(d.shortTitle)} (${d.percent} %)</span>`;
  });
  html += '</div>';
  html += `<div><strong style="color:var(--navy);">Stärkste Dimension:</strong> <span style="color:#2a7d5f; font-weight:600;">${escHtml(strongest.shortTitle)} (${strongest.percent} %)</span></div>`;
  html += '</div>';

  // Dimensions card
  html += '<div class="card">';
  html += '<div class="card-title">Reifegrad nach Dimensionen</div>';
  html += '<div class="card-subtitle">Ihre Standortbestimmung auf einen Blick. Die Detailanalyse besprechen wir im Workshop.</div>';
  dimData.forEach(d => {
    html += '<div class="dim-result-item">';
    html += `<div class="dim-result-name">${escHtml(d.shortTitle)}</div>`;
    html += `<div class="dim-result-bar-bg"><div class="dim-result-bar-fill" style="width:${d.percent}%; background:${d.status.color};"></div></div>`;
    html += `<div class="dim-result-score">${d.percent} %</div>`;
    html += `<div class="dim-result-status" style="color:${d.status.color};">${escHtml(d.status.label)}</div>`;
    html += '</div>';
  });
  html += '</div>';

  // Praxischeck card
  html += '<div class="card">';
  html += '<div class="card-title">Angaben aus dem Praxischeck</div>';
  html += '<div class="card-subtitle">Diese Angaben fließen nicht in den Score ein. Sie dienen der gezielten Vorbereitung Ihres Diagnose-Workshops.</div>';
  checklists.forEach(cl => {
    const selected = checklistAnswers[cl.key];
    html += '<div class="checklist-result-panel">';
    html += `<div class="checklist-result-title">${escHtml(cl.title)}</div>`;
    if (selected.length > 0) {
      html += '<div class="checklist-result-items">';
      selected.forEach(item => {
        html += `<span class="checklist-result-tag">${escHtml(item)}</span>`;
      });
      html += '</div>';
    } else {
      html += '<div class="checklist-result-none">Keine Angabe gemacht</div>';
    }
    html += '</div>';
  });

  // Sub-question results
  if (subQuestions.top3_kanaele.trim()) {
    html += '<div class="checklist-result-panel">';
    html += '<div class="checklist-result-title">Top 3 Kanäle</div>';
    html += `<p style="font-size:14px; color:var(--text);">${escHtml(subQuestions.top3_kanaele)}</p>`;
    html += '</div>';
  }
  if (subQuestions.tool_integration) {
    html += '<div class="checklist-result-panel">';
    html += '<div class="checklist-result-title">Tool-Integration</div>';
    html += `<p style="font-size:14px; color:var(--text);">${escHtml(subQuestions.tool_integration)}</p>`;
    html += '</div>';
  }
  if (subQuestions.unklar_zugeordnet.trim()) {
    html += '<div class="checklist-result-panel">';
    html += '<div class="checklist-result-title">Unklar zugeordnete Aufgabenbereiche</div>';
    html += `<p style="font-size:14px; color:var(--text);">${escHtml(subQuestions.unklar_zugeordnet)}</p>`;
    html += '</div>';
  }
  html += '</div>';

  // Submit section
  if (!submitted) {
    html += '<div class="submit-section">';
    html += '<h3>Ergebnisse zur Workshop-Vorbereitung absenden</h3>';
    html += '<p>Ihre Antworten und Ergebnisse werden an Audina Kamboua übermittelt. Sie dienen ausschließlich dazu, Ihren Diagnose-Workshop gezielt vorzubereiten.</p>';
    html += '<button class="btn-submit" id="btn-submit" onclick="submitResults()">Absenden zur Workshop-Vorbereitung →</button>';
    html += '</div>';
  } else {
    html += '<div class="confirmation">';
    html += '<div class="confirmation-icon"><span style="color:var(--yellow);">✓</span></div>';
    html += '<h2>Vielen Dank!</h2>';
    html += '<p>Ihre Ergebnisse wurden erfolgreich übermittelt. Wir nutzen Ihre Angaben, um den Diagnose-Workshop optimal vorzubereiten.</p>';
    html += '</div>';
  }

  html += `<div class="nav-bar"><button class="btn btn-back" onclick="prevStep()">← Zurück</button><div></div></div>`;
  app.innerHTML = html;
}

// ====================================================
// INTERACTIONS
// ====================================================
function selectAnswer(key, value) {
  answers[key] = value;
  // Re-render current dimension
  const dimIndex = currentStep - 1;
  renderDimension(document.getElementById('app'), dimIndex);
}

function toggleChecklist(clKey, item, el) {
  const idx = checklistAnswers[clKey].indexOf(item);
  if (idx > -1) {
    checklistAnswers[clKey].splice(idx, 1);
  } else {
    checklistAnswers[clKey].push(item);
  }
  const cb = el.querySelector('input[type="checkbox"]');
  if (cb) cb.checked = !cb.checked;
}

function setSubQuestion(key, value) {
  subQuestions[key] = value;
}

function saveFreitext() {
  if (currentStep >= 1 && currentStep <= 7) {
    const dimIndex = currentStep - 1;
    const ta = document.getElementById('freitext-dim');
    if (ta) freitexte[dimensions[dimIndex].title] = ta.value;
  }
}

function saveSubQuestions() {
  // Save text sub-questions from DOM
  const top3 = document.getElementById('sub-top3_kanaele');
  if (top3) subQuestions.top3_kanaele = top3.value;
  const unklar = document.getElementById('sub-unklar_zugeordnet');
  if (unklar) subQuestions.unklar_zugeordnet = unklar.value;
}

function saveIdentity() {
  const n = document.getElementById('f-name');
  const u = document.getElementById('f-unternehmen');
  const e = document.getElementById('f-email');
  const r = document.getElementById('f-rolle');
  const t = document.getElementById('f-teamgroesse');
  const s = document.getElementById('f-stellen');
  const o = document.getElementById('f-organisation');
  if (n) identity.name = n.value;
  if (u) identity.unternehmen = u.value;
  if (e) identity.email = e.value;
  if (r) identity.rolle = r.value;
  if (t) identity.teamgroesse = t.value;
  if (s) identity.stellen_pro_jahr = s.value;
  if (o) identity.organisation = o.value;
}

function nextStep() {
  if (currentStep === 0) {
    saveIdentity();
    if (!identityValid()) {
      // Mark empty fields
      ['f-name','f-unternehmen','f-email','f-rolle','f-teamgroesse','f-stellen','f-organisation'].forEach(id => {
        const el = document.getElementById(id);
        if (el && !el.value.trim()) el.classList.add('error');
        else if (el) el.classList.remove('error');
      });
      return;
    }
  }
  if (currentStep >= 1 && currentStep <= 7) {
    saveFreitext();
    // Require all questions answered in current dimension
    const dimIndex = currentStep - 1;
    if (!allDimensionQuestionsAnswered(dimIndex)) {
      alert('Bitte beantworten Sie alle Fragen dieser Dimension, bevor Sie fortfahren.');
      return;
    }
  }
  if (currentStep === 8) {
    saveSubQuestions();
  }
  currentStep++;
  render();
}

function prevStep() {
  if (currentStep >= 1 && currentStep <= 7) saveFreitext();
  if (currentStep === 8) saveSubQuestions();
  if (currentStep === 0) return;
  currentStep--;
  render();
}

// ====================================================
// SUBMIT
// ====================================================
function submitResults() {
  const btn = document.getElementById('btn-submit');
  if (btn) { btn.disabled = true; btn.textContent = 'Wird gesendet...'; }

  const gesamtPct = getGesamtPercent();
  const status = getStatusFromPercent(gesamtPct);

  // Build dimensionen
  const dimensionenPayload = {};
  dimensions.forEach((dim, i) => {
    const score = getDimensionScore(i);
    const max = dim.questions.length * 5;
    const pct = getDimensionPercent(i);
    const s = getStatusFromPercent(pct);
    dimensionenPayload[dim.title] = { score, max, percent: pct, status: s.label };
  });

  // Build antworten
  const antwortenPayload = {};
  dimensions.forEach((dim, di) => {
    dim.questions.forEach((q, qi) => {
      const key = `${dim.shortTitle}_F${qi + 1}`;
      const val = answers[`d${di}_q${qi}`] || 0;
      antwortenPayload[key] = {
        wert: val,
        frage: q.text,
        level_text: val > 0 ? q.levels[val - 1] : ''
      };
    });
  });

  // Build beobachtungen
  const beobachtungenPayload = {};
  dimensions.forEach(dim => {
    beobachtungenPayload[dim.title] = freitexte[dim.title] || '';
  });

  // Build checklisten
  const checklistenPayload = {};
  checklists.forEach(cl => {
    checklistenPayload[cl.title] = checklistAnswers[cl.key];
  });

  // Compact Einzelantworten (scores only, fits under 2000 chars)
  let einzelantwortenCompact = '';
  dimensions.forEach((dim, di) => {
    const scores = dim.questions.map((q, qi) => 'F' + (qi+1) + '=' + (answers['d' + di + '_q' + qi] || 0)).join(' | ');
    einzelantwortenCompact += `${dim.shortTitle}: ${scores}\n`;
  });

  // Simple score keys for Make.com URL builder (no special chars)
  const scoreKeys = ['org','eb','zk','cj','pq','dk','tk'];
  const scores = {};
  dimensions.forEach((dim, i) => {
    scores[scoreKeys[i]] = getDimensionScore(i);
  });

  const payload = {
    timestamp: new Date().toISOString(),
    typ: "recruiting-reifegradanalyse",
    identity: identity,
    ergebnis: { gesamtPercent: gesamtPct, status: status.label },
    scores: scores,
    dimensionen: dimensionenPayload,
    antworten: antwortenPayload,
    einzelantworten_kompakt: einzelantwortenCompact.trim(),
    beobachtungen: beobachtungenPayload,
    checklisten: checklistenPayload,
    zusatzfragen: {
      top3_kanaele: subQuestions.top3_kanaele,
      tool_integration: subQuestions.tool_integration,
      unklar_zugeordnet: subQuestions.unklar_zugeordnet
    }
  };

  fetch(MAKE_WEBHOOK_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(r => {
    submitted = true;
    showThankYou();
  })
  .catch(err => {
    console.error('Submit error:', err);
    submitted = true;
    showThankYou();
  });
}

function showThankYou() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; padding:40px 24px;">
      <div style="font-size:64px; margin-bottom:24px; color:var(--yellow);">✓</div>
      <h1 style="font-size:28px; font-weight:700; color:var(--text); margin-bottom:16px;">Vielen Dank!</h1>
      <p style="font-size:16px; color:var(--text-muted); max-width:480px; line-height:1.6;">Ihre Ergebnisse wurden erfolgreich übermittelt. Wir nutzen Ihre Angaben, um den Diagnose-Workshop optimal vorzubereiten.</p>
      <p style="font-size:14px; color:var(--text-muted); margin-top:24px;">Sie können dieses Fenster jetzt schließen.</p>
    </div>`;
  window.scrollTo(0, 0);
}

// ====================================================
// INIT
// ====================================================
render();
</script>
